<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="bg-blue-600 text-white p-4 flex justify-between items-center">
  <h1 class="text-2xl font-bold">لوحة تحكم الادارة</h1>
  <div>
    <span>مرحبا: <b id="currentUser"></b></span>
    <button onclick="logout()" class="bg-red-500 px-4 py-2 rounded mr-2">تسجيل الخروج</button>
  </div>
</div>

<div class="container mx-auto p-6">
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    
    <!-- اضافة منتج -->
    <div onclick="window.location.href='add-product.html'" class="bg-white p-6 rounded-lg shadow cursor-pointer hover:bg-gray-50">
      <h2 class="font-bold text-lg mb-2">اضافة منتج</h2>
      <p class="text-gray-600">اضافة منتجات جديدة للمخزن</p>
    </div>

    <!-- التقارير -->
    <div onclick="window.location.href='reports.html'" class="bg-white p-6 rounded-lg shadow cursor-pointer hover:bg-gray-50">
      <h2 class="font-bold text-lg mb-2">التقارير</h2>
      <p class="text-gray-600">عرض تقارير المبيعات</p>
    </div>

    <!-- ادارة المستخدمين -->
    <div onclick="window.location.href='users.html'" class="bg-white p-6 rounded-lg shadow cursor-pointer hover:bg-gray-50">
      <h2 class="font-bold text-lg mb-2">ادارة المستخدمين</h2>
      <p class="text-gray-600">اضافة وحذف المستخدمين</p>
    </div>

  </div>
</div>

<script>
// منع الدخول اذا مو ادمن
if(localStorage.getItem('loggedIn') !== 'true' || localStorage.getItem('currentUser') !== 'admin'){
  window.location.href = 'index.html';
}

// عرض اسم المستخدم
document.getElementById('currentUser').innerText = localStorage.getItem('currentUser');

function logout(){
  localStorage.removeItem('loggedIn');
  localStorage.removeItem('currentUser');
  window.location.href = 'index.html';
}
</script>

</body>
</html>
