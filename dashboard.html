<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة الادارة</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<script>
// فحص تسجيل الدخول
let loggedIn = localStorage.getItem('loggedIn');
let currentUser = localStorage.getItem('currentUser');

if(!loggedIn){
  window.location.href = 'index.html';
}

// يرجعه لصفحة البيع اذا مو admin
if(currentUser !== 'admin'){
  window.location.href = 'sales.html';
}
</script>

<div class="p-6">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-3xl font-bold">لوحة تحكم الادارة</h1>
    <div>
      <span class="ml-4">مرحبا: <b id="userName"></b></span>
      <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded">تسجيل الخروج</button>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    
    <!-- ادارة المنتجات -->
    <a href="add-product.html" class="bg-white p-6 rounded-lg shadow hover:shadow-lg">
      <h2 class="text-xl font-bold mb-2">اضافة منتج</h2>
      <p class="text-gray-600">اضافة منتجات جديدة للمخزن</p>
    </a>

    <!-- التقارير -->
    <a href="reports.html" class="bg-white p-6 rounded-lg shadow hover:shadow-lg">
      <h2 class="text-xl font-bold mb-2">التقارير</h2>
      <p class="text-gray-600">عرض تقارير المبيعات</p>
    </a>

    <!-- ادارة المستخدمين -->
    <a href="users.html" class="bg-white p-6 rounded-lg shadow hover:shadow-lg">
      <h2 class="text-xl font-bold mb-2">ادارة المستخدمين</h2>
      <p class="text-gray-600">اضافة وحذف المستخدمين</p>
    </a>

  </div>
</div>

<script>
document.getElementById('userName').innerText = currentUser;

function logout(){
  localStorage.removeItem('loggedIn');
  localStorage.removeItem('currentUser');
  window.location.href = 'index.html';
}
</script>

</body>
</html>
