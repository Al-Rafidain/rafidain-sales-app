<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة الادارة</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center h-screen">

<div class="bg-gray-800 p-8 rounded-lg shadow-lg w-96 text-center">
  <h1 class="text-2xl font-bold mb-6">مرحبا بك الادارة</h1>
  
  <div class="space-y-3">
    <button class="w-full bg-green-600 p-3 rounded hover:bg-green-700 font-bold cursor-pointer" onclick="window.location.href='reports.html'">عرض التقارير</button>
    <button class="w-full bg-blue-600 p-3 rounded hover:bg-blue-700 font-bold cursor-pointer" onclick="window.location.href='add-product.html'">اضافة منتج</button>
    <button class="w-full bg-purple-600 p-3 rounded hover:bg-purple-700 font-bold cursor-pointer" onclick="alert('قريبا')">المستخدمين</button>
    <button class="w-full bg-red-600 p-3 rounded hover:bg-red-700 font-bold cursor-pointer" onclick="logout()">تسجيل الخروج</button>
  </div>
</div>

<script>
function logout(){
  if(confirm("هل تريد تسجيل الخروج؟")){
    localStorage.clear();
    window.location.href = 'index.html';
  }
}
</script>

</body>
</html>
