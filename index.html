<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام الماركت v6</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Cairo';background:#F0F2F5}
.header{background:linear-gradient(135deg,#1A4D8F,#2E6DB4);color:white;padding:15px;display:flex;justify-content:space-between;font-size:20px;font-weight:bold}
.container{padding:20px;max-width:1400px;margin:auto}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.feature-btn{background:white;padding:15px 8px;border-radius:16px;text-align:center;box-shadow:0 4px 12px rgba(0,0,0,.08);cursor:pointer;border:none;font-family:'Cairo';font-weight:bold;font-size:13px}
.admin-btn{background:#FFC107!important;color:#000!important}
.login-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:#1A4D8F;display:flex;justify-content:center;align-items:center;z-index:1000}
.login-box{background:white;padding:30px;border-radius:16px;width:90%;max-width:500px;text-align:center}
.cashier-btn{background:#28A745;color:white;padding:20px;margin:10px;border:none;border-radius:12px;font-size:18px;cursor:pointer;width:45%}
.btn{background:#1A4D8F;color:white;padding:12px;border:none;border-radius:8px;cursor:pointer;width:100%;margin-top:8px;font-weight:bold}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);justify-content:center;align-items:center;z-index:999}
.modal-content{background:white;padding:25px;border-radius:16px;width:95%;max-width:600px}
input{width:100%;padding:10px;margin:6px 0;border:1px solid #ddd;border-radius:8px}
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h2>👨‍💼 اختر اسمك</h2>
    <div id="cashierList" style="display:flex;flex-wrap:wrap;justify-content:center"></div>
    <button style="background:#DC3545;color:white;padding:12px;border:none;border-radius:8px;width:100%;margin-top:10px" onclick="addNewCashier()">➕ اضافة كاشير جديد</button>
  </div>
</div>

<div id="mainApp" style="display:none">
  <div class="header">
    <div id="marketName">الماركت</div>
    <div><a href="#" onclick="logout()" style="color:white">تبديل الكاشير</a></div>
  </div>
  <div class="container">
    <div class="grid">
      <button class="feature-btn admin-btn" onclick="window.location.href='admin.html'">👑<br>لوحة الادمن</button>
      <button class="feature-btn" onclick="alert('اعدادات')">⚙️<br>اعدادات</button>
      <button class="feature-btn" onclick="alert('طلب جديد')">🛒➕<br>طلب جديد</button>
      <button class="feature-btn" onclick="alert('المنتجات')">📦<br>المنتجات</button>
    </div>
  </div>
</div>

<script>
let cashiers = JSON.parse(localStorage.getItem('cashiers')) || [];
let currentCashier = localStorage.getItem('currentCashier') || '';

function showCashierButtons(){
  let html='';
  if(cashiers.length==0){
    html = '<p style="color:gray">لا يوجد كاشيرين. اضف واحد</p>';
  } else {
    cashiers.forEach(c=>{
      html += `<button class="cashier-btn" onclick="selectCashier('${c.name}')">${c.name}</button>`;
    });
  }
  document.getElementById('cashierList').innerHTML = html;
}

function selectCashier(name){
  currentCashier = name;
  localStorage.setItem('currentCashier', name);
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('mainApp').style.display='block';
  document.getElementById('marketName').innerText = 'الماركت - ' + name;
}

function addNewCashier(){
  let name = prompt('اكتب اسم الكاشير:');
  if(name && name.trim() != ''){
    cashiers.push({id:Date.now(), name:name.trim(), role:'cashier'});
    localStorage.setItem('cashiers', JSON.stringify(cashiers));
    showCashierButtons();
  }
}

function logout(){
  localStorage.removeItem('currentCashier');
  location.reload();
}

window.onload = function(){
  showCashierButtons();
  if(currentCashier){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('mainApp').style.display='block';
    document.getElementById('marketName').innerText = 'الماركت - ' + currentCashier;
  }
}
</script>
</body>
</html>
