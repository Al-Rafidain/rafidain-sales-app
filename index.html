<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>شركة الرافدين للمبيعات v14.0</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Amiri:wght@700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;font-family:'Cairo',sans-serif}
body{
  background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%); /* ازرق نهري يرمز لدجلة والفرات */
  margin:0;padding:10px;min-height:100vh;padding-bottom:130px
}
.box{
  background:rgba(255,255,255,0.95); /* ابيض شفاف */
  backdrop-filter: blur(10px);
  max-width:550px;margin:15px auto;padding:20px;border-radius:20px;box-shadow:0 15px 50px rgba(0,0,0,0.3)
}
.header{
  background: linear-gradient(90deg, #1e3c72 0%, #2a5298 100%); /* ازرق ملكي */
  color:#fff;padding:15px;border-radius:12px;margin-bottom:15px;text-align:center;font-size:20px;font-weight:900;
  box-shadow:0 4px 15px rgba(42,82,152,0.4)
}
input,button{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:10px;font-size:15px}
button{cursor:pointer;font-weight:700;border:none}
.btn-add{background: linear-gradient(90deg, #1e3c72 0%, #2a5298 100%);color:#fff;box-shadow:0 4px 10px rgba(42,82,152,0.3)}
.btn-save{background: linear-gradient(90deg, #11998e 0%, #38ef7d 100%);color:#fff} /* اخضر للفلوس */
.btn-back{background:#6c757d;color:#fff}.btn-admin{background: linear-gradient(90deg, #f7971e 0%, #ffd200 100%);color:#000} /* ذهبي للادمن */
.btn-delete{background:#dc3545;color:#fff;padding:8px 15px;border-radius:8px;width:auto}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}

/* الازرار الجديدة */
.card{
  background:#ffffff;
  color:#1e3c72;
  border:2px solid #ffd700; /* اطار ذهبي */
  border-radius:15px;
  padding:12px 5px;
  text-align:center;
  font-size:11px;
  font-weight:700;
  min-height:70px;
  transition:0.3s;
  box-shadow:0 4px 8px rgba(0,0,0,0.1)
}
.card:hover{
  background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
  color:#fff;
  border-color:#1e3c72;
  transform: translateY(-3px);
  box-shadow:0 8px 15px rgba(42,82,152,0.4)
}
.card.red{background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);color:#fff;border-color:#eb3349}

.hidden{display:none}
.item-card{background:#f0f8ff;padding:12px;border-radius:10px;margin:8px 0;font-size:13px;border-right:4px solid #2a5298}
.logo-text{font-family:'Amiri',serif;font-size:32px;font-weight:900;color:#2a5298;text-shadow: 2px 2px 4px rgba(0,0,0,0.1)}
.footer{
  position:fixed;bottom:0;left:0;right:0;
  background: linear-gradient(90deg, #1e3c72 0%, #2a5298 100%);
  color:#fff;text-align:center;padding:12px;font-size:12px;z-index:999;
  border-top:3px solid #ffd700 /* خط ذهبي */
}
.about-box{background:#e8f5ff;padding:15px;border-radius:10px;text-align:center;line-height:2;border:2px solid #ffd700}
</style>
</head>
<body>

<div class="box" id="loginScreen">
  <div class="header">تسجيل الدخول</div>
  <input type="text" id="username" placeholder="اسم المستخدم">
  <input type="password" id="password" placeholder="كلمة السر">
  <button class="btn-add" onclick="login()">دخول</button>
  <p id="loginError" style="color:red;text-align:center"></p>
</div>

<div class="box hidden" id="mainApp">
  <div class="header" style="background:#fff;color:#2a5298">
    <div class="logo-text">الرافدين</div>
    <div style="font-size:14px;color:#555">العراق</div>
    <div style="font-size:14px;color:#666" id="welcomeStore">اسم المحل</div>
  </div>
  
  <div class="grid" id="menuGrid">
    <button class="card" onclick="showPage('products')">المنتجات</button>
    <button class="card" onclick="showPage('pos')">نقطة البيع</button>
    <button class="card" onclick="showPage('invoices')">الفواتير</button>
    <button class="card" onclick="showPage('invoice')">فاتورة جديدة</button>
    <button class="card" onclick="showPage('addCustomer')">اضافة زبون</button>
    <button class="card" onclick="showPage('customers')">الزبائن</button>
    <button class="card" onclick="showPage('debts')">الديون</button>
    <button class="card" onclick="showPage('expenses')">المصروفات</button>
    <button class="card" onclick="showPage('cashbox')">الصندوق</button>
    <button class="card" onclick="showPage('income')">الايرادات</button>
    <button class="card" onclick="showPage('inventory')">الجرد</button>
    <button class="card" onclick="showPage('reports')">التقارير</button>
    <button class="card" onclick="showPage('employees')">الموظفين</button>
    <button class="card" onclick="showPage('suppliers')">الموردين</button>
    <button class="card" onclick="showPage('branches')">ادارة الفروع</button>
    <button class="card" onclick="showPage('broadcast')">ارسال جماعي</button>
    <button class="card" onclick="showPage('ai')">توقع المبيعات</button>
    <button class="card" onclick="showPage('backup')">النسخ الاحتياطي</button>
    <button class="card" onclick="showPage('logs')">سجل الحركات</button>
    <button class="card" onclick="showPage('settings')">الاعدادات</button>
    <button class="card btn-admin" onclick="showPage('admin')">لوحة الادمن</button>
    <button class="card" onclick="showAbout()">حول</button>
    <button class="card" onclick="toggleDark()">وضع ليلي</button>
    <button class="card red" onclick="logout()">تسجيل</button>
  </div>
  <div id="pageContent" class="hidden"></div>
</div>

<div class="footer">
  <div class="logo-text" style="font-size:18px;color:#ffd700">الرافدين</div>
  <div>جميع الحقوق محفوظة لدى شركة الرافدين للمبيعات © <span id="year"></span></div>
</div>

<script>
const VERSION = "v14.0";
let users = JSON.parse(localStorage.getItem('rafidain_users_v14')) || [{username:"admin", password:"admin123", store:"الادمن الرئيسي", role:"admin"}];
let data = JSON.parse(localStorage.getItem('rafidain_data_v14')) || {products:[],customers:[],invoices:[]};
document.getElementById('year').innerText = new Date().getFullYear();

function saveAll(){
  localStorage.setItem('rafidain_data_v14', JSON.stringify(data));
  localStorage.setItem('rafidain_users_v14', JSON.stringify(users));
}

function login(){
  let u=username.value.trim(); let p=password.value.trim();
  let user = users.find(x=>x.username==u && x.password==p);
  if(user){
    loginScreen.classList.add('hidden'); mainApp.classList.remove('hidden');
    welcomeStore.innerText=user.store;
    if(user.role != 'admin') document.querySelector('.btn-admin').style.display='none';
  }else{loginError.innerText="❌ اسم المستخدم او كلمة السر خطأ"}
}

function toggleDark(){
  document.body.style.background = document.body.style.background.includes('0f2027') 
  ? 'linear-gradient(135deg, #232526 0%, #414345 100%)' 
  : 'linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%)';
}

function showPage(page){
  menuGrid.classList.add('hidden'); pageContent.classList.remove('hidden');
  let html = '<button class="btn-back" onclick="backToMenu()">رجوع</button>';

  if(page=='admin'){
    html += `<div class="header">لوحة الادمن - اضافة حساب جديد</div>
    <input id="newStore" placeholder="اسم المحل">
    <input id="newUser" placeholder="اسم المستخدم">
    <input id="newPass" placeholder="كلمة السر">
    <button class="btn-save" onclick="addUser()">حفظ الحساب</button>
    <hr><h4>الحسابات الموجودة:</h4>`;
    users.filter(u=>u.role!='admin').forEach((u,i)=>{
      html+=`<div class="item-card"><b>${u.store}</b><br>المستخدم: ${u.username}<br>كلمة السر: ${u.password}<br><button class="btn-delete" onclick="deleteUser(${i})">حذف</button></div>`;
    });
  }
  else if(page=='products'){html += `<div class="header">المنتجات</div><input id="pName" placeholder="اسم المنتج"><input id="pPrice" type="number" placeholder="سعر البيع"><button class="btn-save" onclick="saveProduct()">حفظ</button><hr>`; data.products.forEach(p=>html+=`<div class="item-card">${p.name} - ${p.price} د.ع</div>`);}
  else{html += `<div class="header">${page}</div><p>هذه الصفحة جاهزة للعمل</p>`;}
  
  pageContent.innerHTML = html;
}

function addUser(){
  if(!newStore.value || !newUser.value || !newPass.value){alert("املأ كل الحقول"); return;}
  users.push({username:newUser.value,password:newPass.value,store:newStore.value,role:"user"}); 
  saveAll(); 
  alert("✅ تم انشاء الحساب بنجاح");
  newStore.value=''; newUser.value=''; newPass.value='';
  showPage('admin');
}

function saveProduct(){data.products.push({name:pName.value,price:pPrice.value}); saveAll(); showPage('products')}
function deleteUser(index){if(confirm("متأكد؟")){users.splice(index+1,1); saveAll(); showPage('admin');}}

function showAbout(){
  menuGrid.classList.add('hidden'); pageContent.classList.remove('hidden');
  pageContent.innerHTML = `
  <button class="btn-back" onclick="backToMenu()">رجوع</button>
  <div class="header">حول البرنامج</div>
  <div class="about-box">
    <div class="logo-text">الرافدين</div>
    <p><b>نظام ادارة المبيعات والمخازن</b></p>
    <p>الاصدار: ${VERSION}</p>
    <hr>
    <p><b>مطور النظام: مجتبى الجابري</b></p>
    <p><b>رقم الهاتف: 07825280650</b></p>
    <hr>
    <p>جميع الحقوق محفوظة لدى<br>شركة الرافدين للمبيعات © ${new Date().getFullYear()}</p>
  </div>`;
}

function backToMenu(){menuGrid.classList.remove('hidden'); pageContent.classList.add('hidden')}
function logout(){location.reload();}
</script>
</body>
</html>
