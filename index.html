<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>شركة الرافدين للمبيعات v10.5</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Amiri:wght@700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;font-family:'Cairo',sans-serif}
body{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);margin:0;padding:10px;min-height:100vh;padding-bottom:130px}
body.dark{background:#1a1a1a;color:#fff}
.box{background:#fff;max-width:550px;margin:10px auto;padding:15px;border-radius:20px;box-shadow:0 10px 40px rgba(0,0,0,0.2)}
.dark.box{background:#2d2d2d;color:#fff}
.header-main{background:#fff;color:#5b7cff;padding:15px;border-radius:15px;margin-bottom:15px;text-align:center;font-size:20px;font-weight:700;border:2px solid #5b7cff}
.header{background:#5b7cff;color:#fff;padding:12px;border-radius:12px;margin-bottom:10px;text-align:center;font-size:18px;font-weight:700}
input,button,select,textarea{width:100%;padding:10px;margin:6px 0;border:1px solid #ddd;border-radius:8px;font-size:14px}
button{cursor:pointer;font-weight:700;border:none}
.btn-add{background:#5b7cff;color:#fff}.btn-save{background:#28a745;color:#fff}
.btn-edit{background:#17a2b8;color:#fff}.btn-delete{background:#dc3545;color:#fff}
.btn-back{background:#6c757d;color:#fff}.btn-whatsapp{background:#25D366;color:#fff}
.btn-admin{background:#ffc107;color:#000}.btn-about{background:#607d8b;color:#fff}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.card{background:#fff;color:#333;border:1px solid #ddd;border-radius:12px;padding:12px 5px;text-align:center;font-size:11px;font-weight:700;box-shadow:0 2px 5px rgba(0,0,0,0.1);min-height:60px}
.dark.card{background:#3d3d3d;color:#fff}
.card:hover{background:#5b7cff;color:#fff}
.card.red{background:#e63946;color:#fff}
.hidden{display:none}
.item-card{background:#f8f9fa;padding:10px;border-radius:10px;margin:8px 0;font-size:13px}
.logo-text{font-family:'Amiri',serif;font-size:28px;font-weight:900;color:#5b7cff;letter-spacing: 2px}
.footer-logo-text{font-family:'Amiri',serif;font-size:16px;font-weight:900;color:#fff}
.footer{position:fixed;bottom:0;left:0;right:0;background:#2c3e50;color:#fff;text-align:center;padding:10px;font-size:11px;z-index:999}
.about-box{text-align:center;padding:20px}
</style>
</head>
<body>

<div class="box" id="loginScreen">
  <div class="header">تسجيل الدخول</div>
  <input type="text" id="username" placeholder="اسم المستخدم">
  <input type="password" id="password" placeholder="كلمة السر">
  <button class="btn-add" onclick="login()">دخول</button>
  <p id="loginError" style="color:red;text-align:center"></p>
</div>

<div class="box hidden" id="mainApp">
  <div class="header-main">
    <div class="logo-text">الرافدين</div>
    <div style="font-size:14px;color:#666" id="welcomeStore">اسم المحل</div>
  </div>
  <div id="alertBox"></div>
  <div class="grid" id="menuGrid">
    <!-- 22 زر -->
    <button class="card" onclick="showPage('products')">المنتجات</button>
    <button class="card" onclick="showPage('pos')">نقطة البيع</button>
    <button class="card" onclick="showPage('invoices')">الفواتير</button>
    <button class="card" onclick="showPage('invoice')">فاتورة جديدة</button>
    <button class="card" onclick="showPage('addCustomer')">اضافة زبون</button>
    <button class="card" onclick="showPage('customers')">الزبائن</button>
    <button class="card" onclick="showPage('debts')">الديون</button>
    <button class="card" onclick="showPage('expenses')">المصروفات</button>
    <button class="card" onclick="showPage('cashbox')">الصندوق</button>
    <button class="card" onclick="showPage('income')">الايرادات</button>
    <button class="card" onclick="showPage('inventory')">الجرد</button>
    <button class="card" onclick="showPage('reports')">التقارير</button>
    <button class="card" onclick="showPage('employees')">الموظفين</button>
    <button class="card" onclick="showPage('suppliers')">الموردين</button>
    <button class="card" onclick="showPage('branches')">ادارة الفروع</button>
    <button class="card" onclick="showPage('broadcast')">ارسال جماعي</button>
    <button class="card" onclick="showPage('ai')">توقع المبيعات</button>
    <button class="card" onclick="showPage('backup')">النسخ الاحتياطي</button>
    <button class="card" onclick="showPage('logs')">سجل الحركات</button>
    <button class="card" onclick="showPage('settings')">الاعدادات</button>
    <button class="card btn-admin" onclick="showPage('admin')">لوحة الادمن</button>
    <button class="card btn-about" onclick="showAbout()">حول البرنامج</button>
    <button class="card" onclick="toggleDark()">وضع ليلي</button>
    <button class="card red" onclick="logout()">تسجيل خروج</button>
  </div>
  <div id="pageContent" class="hidden"></div>
</div>

<div class="footer">
  <div class="footer-logo-text">الرافدين</div>
  <div>جميع الحقوق محفوظة لدى <b>شركة الرافدين للمبيعات</b> © <span id="year"></span></div>
</div>

<script>
const VERSION = "v10.5";
let users = JSON.parse(localStorage.getItem('rafidain_users_v10')) || [{username:"admin", password:"admin123", store:"الادمن الرئيسي", role:"admin"}];
let data = JSON.parse(localStorage.getItem('rafidain_data_v10')) || {products:[],customers:[],invoices:[],expenses:[],employees:[],suppliers:[],branches:[{name:"الفرع الرئيسي"}],currentBranch:"الفرع الرئيسي",logs:[]};
let currentUser = null;

document.getElementById('year').innerText = new Date().getFullYear();

function saveData(){localStorage.setItem('rafidain_data_v10', JSON.stringify(data)); localStorage.setItem('rafidain_users_v10', JSON.stringify(users));}

function login(){
  let u=username.value.trim(); let p=password.value.trim();
  let user = users.find(x=>x.username==u && x.password==p);
  if(user){
    currentUser = user;
    loginScreen.classList.add('hidden');
    welcomeStore.innerText=user.store + " - " + data.currentBranch;
    // نخفي زر الادمن اذا مو ادمن
    if(user.role != 'admin') document.querySelector('.btn-admin').style.display='none';
    mainApp.classList.remove('hidden');
  }else{loginError.innerText="❌ اسم المستخدم او كلمة السر خطأ"}
}

function showAbout(){
  menuGrid.classList.add('hidden'); pageContent.classList.remove('hidden');
  pageContent.innerHTML = `
  <button class="btn-back" onclick="backToMenu()">رجوع</button>
  <div class="header">حول البرنامج</div>
  <div class="about-box">
    <div class="logo-text" style="font-size:40px">الرافدين</div>
    <p><b>الاصدار:</b> ${VERSION}</p><p><b>الدعم:</b> 07825280650</p>
    <p><b>جميع الحقوق محفوظة © ${new Date().getFullYear()}</b></p>
  </div>`;
}

function toggleDark(){document.body.classList.toggle('dark');}

function showPage(page){
  menuGrid.classList.add('hidden'); pageContent.classList.remove('hidden');
  let html = '<button class="btn-back" onclick="backToMenu()">رجوع</button>';

  if(page=='admin'){
    html += `<div class="header">لوحة الادمن - ادارة الحسابات</div>
    <input id="newUser" placeholder="اسم المستخدم الجديد">
    <input id="newPass" placeholder="كلمة السر">
    <input id="newStore" placeholder="اسم المحل">
    <button class="btn-save" onclick="addUser()">انشاء حساب محل</button><hr>
    <h4>الحسابات الموجودة:</h4>`;
    users.forEach(u=>html+=`<div class="item-card">${u.store} - ${u.username} <button class="btn-delete" style="width:80px;float:left" onclick="deleteUser('${u.username}')">حذف</button></div>`);
  }

  if(page=='products'){html += `<div class="header">المنتجات</div><input id="pName" placeholder="اسم المنتج"><input id="pPrice" type="number" placeholder="سعر البيع"><input id="pQty" type="number" placeholder="الكمية"><button class="btn-save" onclick="saveProduct()">حفظ</button><hr>`; data.products.forEach(p=>html+=`<div class="item-card"><b>${p.name}</b> - ${p.price} د.ع - ${p.qty} قطعة</div>`);}
  
  if(page=='customers'){html += `<div class="header">الزبائن</div><hr>`; data.customers.forEach(c=>html+=`<div class="item-card"><b>${c.name}</b> - ${c.phone}</div>`);}
  
  if(page=='addCustomer'){html += `<div class="header">اضافة زبون</div><input id="cName" placeholder="اسم الزبون"><input id="cPhone" placeholder="رقم الهاتف / الواتساب"><button class="btn-save" onclick="saveCustomer()">حفظ</button>`;}
  
  if(page=='invoice'){
    let now = new Date().toLocaleString('ar');
    html += `<div class="header">فاتورة جديدة</div>
    <p><b>التاريخ والوقت:</b> ${now}</p>
    <select id="invCustomer"><option>زبون عادي</option>`; data.customers.forEach(c=>html+=`<option>${c.name}</option>`); html+=`</select>
    <input id="invTotal" type="number" placeholder="المبلغ الكلي">
    <button class="btn-save" onclick="saveInvoice('${now}')">اصدار الفاتورة</button>`;
  }
  
  if(page=='invoices'){html += `<div class="header">الفواتير</div><hr>`; data.invoices.forEach(i=>html+=`<div class="item-card">${i.date} <br><b>${i.customer}</b> - ${i.total} د.ع</div>`);}
  
  if(page=='employees'){html += `<div class="header">الموظفين</div><input id="empName" placeholder="اسم الموظف"><button class="btn-save" onclick="saveEmp()">اضافة</button><hr>`; data.employees.forEach(e=>html+=`<div class="item-card">${e.name}</div>`);}
  
  if(page=='suppliers'){html += `<div class="header">الموردين</div><input id="supName" placeholder="اسم المورد"><button class="btn-save" onclick="saveSup()">اضافة</button><hr>`; data.suppliers.forEach(s=>html+=`<div class="item-card">${s.name}</div>`);}
  
  if(page=='branches'){html += `<div class="header">ادارة الفروع</div><input id="branchName" placeholder="اسم الفرع الجديد"><button class="btn-add" onclick="addBranch()">اضافة فرع</button><hr>`; data.branches.forEach(b=>html+=`<div class="item-card">${b.name}</div>`);}
  
  if(page=='reports'){let totalSales = data.invoices.reduce((a,b)=>a+b.total*1,0); html += `<div class="header">التقارير</div><div class="item-card">عدد المنتجات: ${data.products.length}</div><div class="item-card">عدد الزبائن: ${data.customers.length}</div><div class="item-card">اجمالي المبيعات: ${totalSales} د.ع</div>`;}
  
  if(page=='pos'){html += `<div class="header">نقطة البيع</div><button class="btn-save" onclick="alert('تم البيع')">بيع</button>`;}
  if(page=='debts'){html += `<div class="header">الديون</div>`;}
  if(page=='expenses'){html += `<div class="header">المصروفات</div><input id="exDesc" placeholder="البيان"><input id="exAmount" type="number" placeholder="المبلغ"><button class="btn-save" onclick="saveExpense()">حفظ</button>`;}
  if(page=='cashbox'){html += `<div class="header">الصندوق</div>`;}
  if(page=='income'){html += `<div class="header">الايرادات</div>`;}
  if(page=='inventory'){html += `<div class="header">الجرد</div>`;}
  if(page=='broadcast'){html += `<div class="header">ارسال جماعي</div><textarea id="broadcastMsg"></textarea><button class="btn-whatsapp" onclick="sendBroadcast()">ارسال</button>`;}
  if(page=='ai'){html += `<div class="header">توقع المبيعات</div>`;}
  if(page=='backup'){html += `<div class="header">النسخ الاحتياطي</div><button class="btn-save" onclick="downloadBackup()">تحميل</button>`;}
  if(page=='logs'){html += `<div class="header">سجل الحركات</div>`;}
  if(page=='settings'){html += `<div class="header">الاعدادات</div>`;}

  pageContent.innerHTML = html;
}

// دوال الحفظ
function addUser(){if(newUser.value&&newPass.value){users.push({username:newUser.value,password:newPass.value,store:newStore.value,role:"user"}); saveData(); showPage('admin')}}
function deleteUser(u){users = users.filter(x=>x.username!=u); saveData(); showPage('admin')}
function saveProduct(){data.products.push({name:pName.value,price:pPrice.value,qty:pQty.value}); saveData(); showPage('products')}
function saveCustomer(){data.customers.push({name:cName.value,phone:cPhone.value}); saveData(); showPage('customers')}
function saveInvoice(date){data.invoices.push({customer:invCustomer.value,total:invTotal.value,date:date,branch:data.currentBranch}); saveData(); alert('تم اصدار الفاتورة'); showPage('invoices')}
function saveExpense(){data.expenses.push({desc:exDesc.value,amount:exAmount.value}); saveData();}
function saveEmp(){data.employees.push({name:empName.value}); saveData(); showPage('employees')}
function saveSup(){data.suppliers.push({name:supName.value}); saveData(); showPage('suppliers')}
function addBranch(){data.branches.push({name:branchName.value}); saveData(); showPage('branches')}
function sendBroadcast(){alert("تم الارسال")}
function downloadBackup(){let blob = new Blob([JSON.stringify({users,data})], {type: 'application/json'}); let a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='backup.json'; a.click()}
function backToMenu(){menuGrid.classList.remove('hidden'); pageContent.classList.add('hidden')}
function logout(){location.reload();}
</script>
</body>
</html>
