<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center h-screen">

<div class="bg-gray-800 p-8 rounded-lg shadow-lg w-96">
  <h1 class="text-2xl font-bold text-center mb-6">تسجيل الدخول</h1>
  
  <input id="username" type="text" placeholder="اسم المستخدم" class="w-full p-2 mb-3 rounded bg-gray-700 text-white">
  
  <input id="password" type="password" placeholder="كلمة السر" class="w-full p-2 mb-4 rounded bg-gray-700 text-white">
  
  <button onclick="login()" class="w-full bg-blue-600 p-3 rounded font-bold hover:bg-blue-700">دخول</button>
  
  <p id="error" class="text-red-500 text-center mt-3 hidden">الاسم او كلمة السر خطأ</p>
</div>

<script>
// اجباري كل ما يفتح الموقع يحدث المستخدمين
let users = [
  {username:"admin", password:"1234"},
  {username:"ahmed", password:"1234"}
];
localStorage.setItem('users', JSON.stringify(users));

function login(){
  let user = document.getElementById('username').value.trim();
  let pass = document.getElementById('password').value.trim();
  
  let found = users.find(u => u.username === user && u.password === pass);
  
  if(found){
    localStorage.setItem('loggedIn', 'true');
    localStorage.setItem('currentUser', user);
    
    // هنا يفرق بين الادمن والموظف
    if(user === 'admin'){
      window.location.href = 'dashboard.html';
    } else {
      window.location.href = 'sales.html';
    }
    
  } else {
    document.getElementById('error').classList.remove('hidden');
  }
}
</script>

</body>
</html>
