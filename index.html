<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نظام الرافدين للمبيعات</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center h-screen">
  <div class="bg-gray-800 p-8 rounded-lg shadow-lg w-96">
    <h1 class="text-2xl font-bold text-center mb-6">تسجيل الدخول</h1>
    <input id="email" type="email" placeholder="الايميل" value="admin@rafidain.com" class="w-full p-2 mb-4 bg-gray-700 rounded">
    <input id="password" type="password" placeholder="كلمة السر" value="12345678" class="w-full p-2 mb-4 bg-gray-700 rounded">
    <button onclick="login()" class="w-full bg-blue-600 p-2 rounded hover:bg-blue-700">دخول</button>
    <p id="msg" class="text-center mt-3 text-sm"></p>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBuLk1zV5ZJpQ9X8Y7W6E5R4T3Q2W1E0R9",
      authDomain: "rafidain-sales.firebaseapp.com",
      projectId: "rafidain-sales",
      storageBucket: "rafidain-sales.appspot.com",
      messagingSenderId: "123456789012",
      appId: "1:123456789012:web:abcdef1234567890abcdef"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const msg = document.getElementById('msg');
      
      msg.innerText = "جاري تسجيل الدخول...";
      
      auth.signInWithEmailAndPassword(email, password)
      .then((userCredential) => {
        msg.innerText = "تم الدخول بنجاح ✅";
        msg.className = "text-green-400 text-center mt-3 text-sm";
      })
      .catch((error) => {
        msg.innerText = "خطأ: " + error.code;
        msg.className = "text-red-400 text-center mt-3 text-sm";
        alert("خطأ كامل: " + error.message); // هذا راح يبينا المشكلة
      });
    }
  </script>
</body>
</html>
