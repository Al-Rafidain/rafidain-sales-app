<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>شركة الرافدين للمبيعات v6.0 Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;font-family:'Cairo',sans-serif}
body{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);margin:0;padding:20px;min-height:100vh}
.box{background:#fff;max-width:900px;margin:20px auto;padding:25px;border-radius:15px;box-shadow:0 10px 40px rgba(0,0,0,0.2)}
input,button,select{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:8px;font-size:15px}
button{background:#667eea;color:#fff;border:none;cursor:pointer;font-weight:700}
button:hover{background:#5563d6}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.grid button{background:#f8f9fa;color:#333;border:1px solid #e0e0e0}
.grid button:hover{background:#667eea;color:#fff}
.header{background:#667eea;color:#fff;padding:15px;border-radius:10px;margin-bottom:20px;text-align:center}
.hidden{display:none}
.user-card{background:#f1f1f1;padding:10px;border-radius:8px;margin:5px 0;display:flex;justify-content:space-between}
</style>
</head>
<body>

<!-- 1. شاشة تسجيل الدخول -->
<div class="box" id="loginScreen">
  <div class="header"><h2>تسجيل الدخول - الرافدين v6.0 Pro</h2></div>
  <input type="text" id="username" placeholder="اسم المستخدم">
  <input type="password" id="password" placeholder="كلمة السر">
  <button onclick="login()">دخول</button>
  <p id="loginError" style="color:red;text-align:center"></p>
</div>

<!-- 2. شاشة الادمن -->
<div class="box hidden" id="adminScreen">
  <div class="header"><h2>لوحة تحكم الادمن</h2></div>
  <h3>اضافة مستخدم جديد</h3>
  <input type="text" id="newUser" placeholder="اسم المستخدم للزبون">
  <input type="password" id="newPass" placeholder="كلمة السر">
  <input type="text" id="storeName" placeholder="اسم المحل">
  <button onclick="addUser()">+ اضافة مستخدم</button>
  <hr>
  <h3>قائمة المستخدمين</h3>
  <div id="userList"></div>
  <button onclick="logout()" style="background:#dc3545">تسجيل خروج</button>
</div>

<!-- 3. شاشة البرنامج الرئيسية - 22 زر -->
<div class="box hidden" id="mainApp">
  <div class="header"><h2 id="welcomeStore">شركة الرافدين للمبيعات</h2></div>
  
  <div class="grid">
    <button onclick="alert('المنتجات')">المنتجات</button>
    <button onclick="alert('فاتورة جديدة')">فاتورة جديدة</button>
    <button onclick="alert('نقطة البيع')">نقطة البيع</button>
    <button onclick="showAdmin()" id="adminBtn">لوحة التحكم</button>
    
    <button onclick="alert('الفواتير')">الفواتير</button>
    <button onclick="alert('اضافة زبون')">اضافة زبون</button>
    <button onclick="alert('الزبائن')">الزبائن</button>
    <button onclick="alert('اضافة مخزن')">اضافة مخزن</button>
    
    <button onclick="alert('اضافة موظف')">اضافة موظف</button>
    <button onclick="alert('الموظفين')">الموظفين</button>
    <button onclick="alert('اضافة مورد')">اضافة مورد</button>
    <button onclick="alert('الموردين')">الموردين</button>
    
    <button onclick="alert('المصروفات')">المصروفات</button>
    <button onclick="alert('الايرادات')">الايرادات</button>
    <button onclick="alert('التقارير')">التقارير</button>
    <button onclick="alert('الجرد')">الجرد</button>
    
    <button onclick="alert('النسخ الاحتياطي')">النسخ الاحتياطي</button>
    <button onclick="alert('الاعدادات')">الاعدادات</button>
    <button onclick="alert('الدعم الفني')">الدعم الفني</button>
    <button onclick="logout()" style="background:#dc3545">تسجيل خروج</button>
  </div>
</div>

<script>
// تحميل المستخدمين من التخزين
let users = JSON.parse(localStorage.getItem('rafidain_users_v6')) || [
  {username:"admin", password:"admin123", store:"شركة الرافدين - الادمن", role:"admin"}
];

function saveUsers(){localStorage.setItem('rafidain_users_v6', JSON.stringify(users))}

function login(){
  let u=document.getElementById('username').value.trim();
  let p=document.getElementById('password').value.trim();
  let user = users.find(x=>x.username==u && x.password==p);
  if(user){
    localStorage.setItem('currentUser_v6', JSON.stringify(user));
    document.getElementById('loginScreen').classList.add('hidden');
    if(user.role=="admin"){
      showAdminPanel();
      document.getElementById('adminBtn').classList.remove('hidden');
    }else{
      document.getElementById('adminBtn').classList.add('hidden');
      document.getElementById('welcomeStore').innerText=user.store;
      document.getElementById('mainApp').classList.remove('hidden');
    }
  }else{
    document.getElementById('loginError').innerText="❌ اسم المستخدم او كلمة السر خطأ";
  }
}

function showAdminPanel(){
  document.getElementById('adminScreen').classList.remove('hidden');
  loadUserList();
}

function showAdmin(){
  let user=JSON.parse(localStorage.getItem('currentUser_v6'));
  if(user.role=="admin"){showAdminPanel()} else {alert("ما عندك صلاحية")}
}

function addUser(){
  let u=document.getElementById('newUser').value.trim();
  let p=document.getElementById('newPass').value.trim();
  let s=document.getElementById('storeName').value.trim();
  if(!u||!p||!s){alert("املأ كل الحقول");return}
  if(users.find(x=>x.username==u)){alert("اسم المستخدم موجود");return}
  users.push({username:u,password:p,store:s,role:"user"});
  saveUsers();
  document.getElementById('newUser').value="";
  document.getElementById('newPass').value="";
  document.getElementById('storeName').value="";
  alert("✅ تمت اضافة المستخدم بنجاح");
  loadUserList();
}

function loadUserList(){
  let html="";
  users.filter(x=>x.role=="user").forEach((u,i)=>{
    html+=`<div class="user-card"><span><b>${u.store}</b><br>${u.username} / ${u.password}</span><button onclick="deleteUser(${i})" style="background:red;width:auto">حذف</button></div>`
  });
  document.getElementById('userList').innerHTML=html || "<p>لا يوجد مستخدمين</p>";
}

function deleteUser(index){
  if(confirm("متأكد تريد تحذف هذا المستخدم؟")){
    users.splice(index+1,1); // +1 لان اول واحد هو الادمن
    saveUsers();
    loadUserList();
  }
}

function logout(){
  localStorage.removeItem('currentUser_v6');
  location.reload();
}

// فحص اذا اكو مستخدم مسجل دخول
window.onload=function(){
  let user=JSON.parse(localStorage.getItem('currentUser_v6'));
  if(user){
    document.getElementById('loginScreen').classList.add('hidden');
    if(user.role=="admin"){showAdminPanel()}else{
      document.getElementById('welcomeStore').innerText=user.store;
      document.getElementById('mainApp').classList.remove('hidden');
    }
  }
}
</script>
</body>
</html>
