<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تسجيل الدخول</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center h-screen">

<div class="bg-gray-800 p-8 rounded-lg shadow-lg w-96">
  <h1 class="text-2xl font-bold text-center mb-6">تسجيل الدخول</h1>
  <input id="username" type="text" placeholder="اسم المستخدم" class="w-full p-2 mb-3 rounded bg-gray-700">
  <input id="password" type="password" placeholder="كلمة السر" class="w-full p-2 mb-4 rounded bg-gray-700">
  <button onclick="login()" class="w-full bg-blue-600 p-3 rounded font-bold">دخول</button>
  <p id="error" class="text-red-500 text-center mt-3 hidden">الاسم او كلمة السر خطأ</p>
</div>

<script>
let users = JSON.parse(localStorage.getItem('users'));
if(!users){
  users = [{username:"admin", password:"1234"}];
  localStorage.setItem('users', JSON.stringify(users));
}

function login(){
  let user = document.getElementById('username').value.trim();
  let pass = document.getElementById('password').value.trim();
  users = JSON.parse(localStorage.getItem('users'));
  let found = users.find(u => u.username === user && u.password === pass);
  if(found){
    localStorage.setItem('loggedIn', 'true');
    window.location.href = 'dashboard.html';
  } else {
    document.getElementById('error').classList.remove('hidden');
  }
}
</script>
</body>
</html>
