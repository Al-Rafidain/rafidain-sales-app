<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>نظام الماركت v6</title><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Cairo';background:#F0F2F5}.header{background:linear-gradient(135deg,#1A4D8F,#2E6DB4);color:white;padding:15px;display:flex;justify-content:space-between;font-size:20px;font-weight:bold}.cashier-info{background:white;color:#1A4D8F;padding:8px 15px;border-radius:8px;font-size:14px}.container{padding:20px;max-width:1400px;margin:auto}.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}.stat-card{background:white;padding:15px;border-radius:16px;text-align:center;box-shadow:0 4px 12px rgba(0,0,0,.08)}.stat-card h3{color:#1A4D8F;font-size:24px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}.feature-btn{background:white;padding:15px 8px;border-radius:16px;text-align:center;box-shadow:0 4px 12px rgba(0,0,0,.08);cursor:pointer;border:none;font-family:'Cairo';font-weight:bold;font-size:13px}.admin-btn{background:#FFC107!important;color:#000!important}.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);justify-content:center;align-items:center;z-index:999}.modal-content{background:white;padding:25px;border-radius:16px;width:95%;max-width:800px;max-height:90vh;overflow-y:auto}.btn{background:#1A4D8F;color:white;padding:12px;border:none;border-radius:8px;cursor:pointer;width:100%;margin-top:8px;font-weight:bold}input,select{width:100%;padding:10px;margin:6px 0;border:1px solid #ddd;border-radius:8px;font-family:'Cairo'}table{width:100%;background:white;border-radius:12px;margin-top:15px;border-collapse:collapse}table th{background:#1A4D8F;color:white;padding:10px}table td{padding:10px;text-align:center;border-bottom:1px solid #eee}#invoicePrint{display:none;width:80mm;font-size:12px}@media print{body *{visibility:hidden}#invoicePrint,#invoicePrint *{visibility:visible}#invoicePrint{position:absolute;left:0;top:0;display:block!important}}.login-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:#1A4D8F;display:flex;justify-content:center;align-items:center;z-index:1000}.login-box{background:white;padding:30px;border-radius:16px;width:90%;max-width:500px;text-align:center}.cashier-btn{background:#28A745;color:white;padding:20px;margin:10px;border:none;border-radius:12px;font-size:18px;cursor:pointer;width:45%}.alert{background:#FFF3CD;border:1px solid #FFC107;padding:10px;border-radius:8px;margin:10px 0}</style></head><body><div class="login-screen" id="loginScreen"><div class="login-box"><h2>👨‍💼 اختر اسمك</h2><div id="cashierList"></div><button style="background:#DC3545;color:white;padding:10px;border:none;border-radius:8px;width:100%;margin-top:10px" onclick="addNewCashier()">➕ اضافة كاشير جديد</button></div></div><div class="header"><div id="marketName">الماركت</div><div class="cashier-info">👨‍💼 <span id="currentCashierSpan">الكاشير</span> | <a href="#" onclick="logout()" style="color:#1A4D8F">تبديل</a></div></div><div class="container"><div class="stats"><div class="stat-card"><h3 id="totalOrders">0</h3><p>📦 الطلبات</p></div><div class="stat-card"><h3 id="totalRevenue">0</h3><p>💰 الايراد</p></div><div class="stat-card"><h3 id="cashBox">0</h3><p>💵 الخزنة</p></div><div class="stat-card"><h3 id="totalCustomers">0</h3><p>👥 العملاء</p></div><div class="stat-card"><h3 id="totalPoints">0</h3><p>⭐ النقاط</p></div><div class="stat-card"><h3 id="totalDebt">0</h3><p>📉 الديون</p></div></div><div id="lowStockAlert"></div><div class="grid"><button class="feature-btn admin-btn" onclick="window.location.href='admin.html'">👑<br>لوحة الادمن</button><button class="feature-btn" onclick="openModal('settingsModal')">⚙️<br>اعدادات</button><button class="feature-btn" onclick="openModal('customerModal')">👤➕<br>عميل جديد</button><button class="feature-btn" onclick="openModal('orderModal')">🛒➕<br>طلب جديد</button><button class="feature-btn" onclick="showCart()">🧺<br>السلة</button><button class="feature-btn" onclick="openModal('barcodeModal')">🔢<br>الباركود</button><button class="feature-btn" onclick="printLastInvoice()">🖨️<br>طباعة</button><button class="feature-btn" onclick="showOrders()">📋<br>السجل</button><button class="feature-btn" onclick="showDebts()">💳<br>الديون</button><button class="feature-btn" onclick="showReport()">📊<br>التقارير</button><button class="feature-btn" onclick="openModal('productModal')">📦<br>المنتجات</button><button class="feature-btn" onclick="inventoryCheck()">⚠️<br>الجرد</button><button class="feature-btn" onclick="openModal('loyaltyModal')">⭐<br>النقاط</button><button class="feature-btn" onclick="closeShift()">🕐<br>الوردية</button><button class="feature-btn" onclick="openModal('returnModal')">↩️<br>مرتجع</button><button class="feature-btn" onclick="backupData()">☁️<br>نسخ</button><button class="feature-btn" onclick="showCashiers()">👨‍💼<br>الكاشيرين</button></div><div id="contentArea" style="margin-top:20px"></div></div><div class="modal" id="returnModal"><div class="modal-content"><h3>مرتجع</h3><input id="returnInvoice" placeholder="رقم الفاتورة"><button class="btn" onclick="doReturn()">ارجاع</button><button class="btn" style="background:#DC3545" onclick="closeModal('returnModal')">الغاء</button></div></div><div class="modal" id="barcodeModal"><div class="modal-content"><h3>الباركود</h3><input id="barcodeInput" placeholder="رقم الباركود"><button class="btn" onclick="searchBarcode()">بحث</button><div id="barcodeResult"></div><button class="btn" style="background:#DC3545" onclick="closeModal('barcodeModal')">اغلاق</button></div></div><div class="modal" id="settingsModal"><div class="modal-content"><h3>الاعدادات</h3><input id="setMarketName" placeholder="اسم الماركت"><input id="setMarketPhone" placeholder="الهاتف"><input id="setLoyaltyRate" type="number" placeholder="كل كم دينار = نقطة"><input id="setLowStock" type="number" placeholder="تنبيه المخزون"><select id="paperSize"><option value="80">80mm</option><option value="58">58mm</option></select><button class="btn" onclick="saveSettings()">حفظ</button><button class="btn" style="background:#DC3545" onclick="closeModal('settingsModal')">الغاء</button></div></div><div class="modal" id="customerModal"><div class="modal-content"><h3>عميل جديد</h3><input id="custName" placeholder="الاسم"><input id="custPhone" placeholder="الهاتف"><button class="btn" onclick="addCustomer()">حفظ</button><button class="btn" style="background:#DC3545" onclick="closeModal('customerModal')">الغاء</button></div></div><div class="modal" id="productModal"><div class="modal-content"><h3>منتج</h3><input id="prodCode" placeholder="كود"><input id="prodName" placeholder="الاسم"><input id="prodPrice" type="number" placeholder="السعر"><input id="prodStock" type="number" placeholder="المخزون"><button class="btn" onclick="addProduct()">حفظ</button><button class="btn" style="background:#DC3545" onclick="closeModal('productModal')">الغاء</button></div></div><div class="modal" id="orderModal"><div class="modal-content"><h3>طلب</h3><select id="orderCustomer"></select><input id="orderProduct" placeholder="المنتج"><input id="orderPrice" type="number" placeholder="السعر"><input id="orderQty" type="number" value="1"><button class="btn" onclick="addToCart()">اضافة</button><div id="cartList"></div><h4>الاجمالي: <span id="cartTotal">0</span></h4><select id="paymentMethod"><option>كاش</option><option>ماستر</option><option>دين</option></select><button class="btn" style="background:#28A745" onclick="completeOrder()">حفظ</button><button class="btn" style="background:#DC3545" onclick="closeModal('orderModal')">الغاء</button></div></div><div class="modal" id="loyaltyModal"><div class="modal-content"><h3>النقاط</h3><p>كل <span id="loyaltyRateSpan">100000</span> = نقطة</p><button class="btn" onclick="showTopCustomers()">🏆 افضل 10</button><button class="btn" style="background:#DC3545" onclick="closeModal('loyaltyModal')">اغلاق</button></div></div><div id="invoicePrint"></div><script>let customers=JSON.parse(localStorage.getItem('customers'))||[];let orders=JSON.parse(localStorage.getItem('orders'))||[];let products=JSON.parse(localStorage.getItem('products'))||[{code:'111',name:'بسي',price:1000,stock:50}];let cashiers=JSON.parse(localStorage.getItem('cashiers'))||[{id:1,name:'احمد',role:'cashier'}];let cart=[];let settings=JSON.parse(localStorage.getItem('settings'))||{marketName:'الماركت',loyaltyRate:100000,paperSize:'80',lowStock:5};let currentCashier=localStorage.getItem('currentCashier')||'';window.onload=function(){showCashierButtons();if(currentCashier){document.getElementById('loginScreen').style.display='none';document.getElementById('currentCashierSpan').innerText=currentCashier}document.getElementById('marketName').innerText=settings.marketName;document.getElementById('loyaltyRateSpan').innerText=settings.loyaltyRate;checkLowStock();updateStats()}function showCashierButtons(){let html='';cashiers.forEach(c=>{html+=`<button class="cashier-btn" onclick="selectCashier('${c.name}')">${c.name}</button>`});document.getElementById('cashierList').innerHTML=html}function selectCashier(name){currentCashier=name;localStorage.setItem('currentCashier',name);document.getElementById('loginScreen').style.display='none';document.getElementById('currentCashierSpan').innerText=name}function addNewCashier(){let name=prompt('اسم الكاشير:');if(name){cashiers.push({id:Date.now(),name,role:'cashier'});localStorage.setItem('cashiers',JSON.stringify(cashiers));showCashierButtons()}}function logout(){localStorage.removeItem('currentCashier');location.reload()}function openModal(id){document.getElementById(id).style.display='flex';loadCustomers()}function closeModal(id){document.getElementById(id).style.display='none'}function searchBarcode(){let code=document.getElementById('barcodeInput').value;let p=products.find(x=>x.code==code);document.getElementById('barcodeResult').innerHTML=p?`<p style="color:green">✅ ${p.name}</p><button class="btn" onclick="addToCartFromBarcode('${p.name}',${p.price})">اضافة</button>`:`<p style="color:red">❌ غير موجود</p>`}function addToCartFromBarcode(n,p){cart.push({product:n,price:p,qty:1});showCart()}function saveSettings(){settings={marketName:document.getElementById('setMarketName').value,phone:document.getElementById('setMarketPhone').value,loyaltyRate:+document.getElementById('setLoyaltyRate').value,paperSize:document.getElementById('paperSize').value,lowStock:+document.getElementById('setLowStock').value};localStorage.setItem('settings',JSON.stringify(settings));location.reload()}function addCustomer(){customers.push({id:Date.now(),name:document.getElementById('custName').value,phone:document.getElementById('custPhone').value,points:0,debt:0});localStorage.setItem('customers',JSON.stringify(customers));closeModal('customerModal');updateStats()}function addProduct(){products.push({code:document.getElementById('prodCode').value,name:document.getElementById('prodName').value,price:+document.getElementById('prodPrice').value,stock:+document.getElementById('prodStock').value});localStorage.setItem('products',JSON.stringify(products));closeModal('productModal')}function addToCart(){cart.push({product:document.getElementById('orderProduct').value,price:+document.getElementById('orderPrice').value,qty:+document.getElementById('orderQty').value});showCart()}function showCart(){let html='<h4>السلة</h4>';let total=0;cart.forEach(i=>{total+=i.price*i.qty;html+=`<p>${i.product} x${i.qty}</p>`});document.getElementById('cartList').innerHTML=html;document.getElementById('cartTotal').innerText=total}function loadCustomers(){document.getElementById('orderCustomer').innerHTML='<option>عميل عادي</option>';customers.forEach(c=>document.getElementById('orderCustomer').innerHTML+=`<option value="${c.id}">${c.name}</option>`)}function completeOrder(){let total=cart.reduce((s,i)=>s+i.price*i.qty,0);orders.push({id:'INV'+Date.now(),items:cart,total,payment:document.getElementById('paymentMethod').value,date:new Date().toLocaleString('ar-IQ'),cashier:currentCashier});localStorage.setItem('orders',JSON.stringify(orders));cart=[];closeModal('orderModal');updateStats()}function printLastInvoice(){alert('طباعة')}function showOrders(){document.getElementById('contentArea').innerHTML='<h3>السجل</h3>'+orders.map(o=>`<p>${o.id} - ${o.total}</p>`).join('')}function showDebts(){document.getElementById('contentArea').innerHTML='<h3>الديون</h3>'+customers.filter(c=>c.debt>0).map(c=>`<p>${c.name}: ${c.debt}</p>`).join('')}function showReport(){document.getElementById('contentArea').innerHTML=`<h3>التقرير</h3><p>الطلبات: ${orders.length}</p>`}function closeShift(){alert('تم الاغلاق')}function backupData(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify({customers,orders,products})]));a.download='backup.json';a.click()}function showCashiers(){document.getElementById('contentArea').innerHTML='<h3>الكاشيرين</h3>'+cashiers.map(c=>`<p>${c.name}</p>`).join('')}function updateStats(){document.getElementById('totalOrders').innerText=orders.length;document.getElementById('totalRevenue').innerText=orders.reduce((s,o)=>s+o.total,0)}function checkLowStock(){}function inventoryCheck(){}function doReturn(){}function showTopCustomers(){}</script></body></html>
