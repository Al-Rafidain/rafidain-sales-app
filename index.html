<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شركة الرافدين</title>
<style>
  body{margin:0; font-family:'Tahoma'; background:linear-gradient(180deg, #4c1d95 0%, #7c3aed 100%); min-height:100vh; padding:20px;}
  .container{max-width:500px; margin:auto; background:white; border-radius:20px; padding:20px; box-shadow:0 10px 30px rgba(0,0,0,0.3);}
  .logo{width:80px; height:80px; margin:0 auto 15px; display:block;}
  h1{color:#6d28d9; text-align:center; margin:10px 0; font-size:28px;}
  .subtitle{color:#666; text-align:center; margin-bottom:20px;}
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .btn{background:#f3e8ff; border:none; padding:15px 10px; border-radius:12px; cursor:pointer; font-size:14px; transition:0.2s;}
  .btn:hover{background:#ddd6fe; transform:scale(1.02);}
  #subScreen{display:none; padding:20px;}
  input{width:90%; padding:10px; margin:5px 0; border:1px solid #ccc; border-radius:8px;}
  .backBtn{background:gray; color:white; width:100%; padding:12px; border:none; border-radius:8px; margin-top:15px;}
</style>
</head>
<body>

<div class="container" id="mainScreen">
  <img src="logo-192.png" class="logo">
  <h1>شركة الرافدين</h1>
  <p class="subtitle">نظام إدارة المبيعات المتكامل</p>
  
  <div class="grid">
    <button class="btn" onclick="showScreen('إدارة العملاء')">1. إدارة العملاء</button>
    <button class="btn" onclick="showScreen('إدارة المنتجات')">2. إدارة المنتجات</button>
    <button class="btn" onclick="showScreen('فواتير المبيعات')">3. فواتير المبيعات</button>
    <button class="btn" onclick="showScreen('المرتجعات')">4. المرتجعات</button>
    <button class="btn" onclick="showScreen('تقارير يومية')">5. تقارير يومية</button>
    <button class="btn" onclick="showScreen('تقارير شهرية')">6. تقارير شهرية</button>
    <button class="btn" onclick="showScreen('إدارة المخزن')">7. إدارة المخزن</button>
    <button class="btn" onclick="showScreen('تنبيهات نفاد المخزون')">8. تنبيهات نفاد المخزون</button>
    <button class="btn" onclick="showScreen('باركود المنتجات')">9. باركود المنتجات</button>
    <button class="btn" onclick="showScreen('طباعة الفواتير')">10. طباعة الفواتير</button>
    <button class="btn" onclick="showScreen('حسابات العملاء')">11. حسابات العملاء</button>
    <button class="btn" onclick="showScreen('الدفع الآجل')">12. الدفع الآجل</button>
    <button class="btn" onclick="showScreen('خصومات وعروض')">13. خصومات وعروض</button>
    <button class="btn" onclick="showScreen('صلاحيات المستخدمين')">14. صلاحيات المستخدمين</button>
    <button class="btn" onclick="showScreen('إدارة الموردين')">15. إدارة الموردين</button>
    <button class="btn" onclick="showScreen('فواتير المشتريات')">16. فواتير المشتريات</button>
    <button class="btn" onclick="showScreen('المصروفات')">17. المصروفات</button>
    <button class="btn" onclick="showScreen('الجرد')">18. الجرد</button>
    <button class="btn" onclick="showScreen('الحسابات')">19. الحسابات</button>
    <button class="btn" onclick="showScreen('إدارة الفئات')">20. إدارة الفئات</button>
    <button class="btn" onclick="showScreen('النسخ الاحتياطي')">21. النسخ الاحتياطي</button>
    <button class="btn" onclick="showScreen('إعدادات النظام')">22. إعدادات النظام</button>
  </div>
</div>

<div class="container" id="subScreen">
  <h2 id="screenTitle" style="color:#6d28d9; text-align:center;"></h2>
  <div id="screenContent"></div>
  <button class="backBtn" onclick="goBack()">رجوع للقائمة</button>
</div>

<script>
let data = JSON.parse(localStorage.getItem('rafidainData')) || {products:[], customers:[], sales:[], suppliers:[], employees:[], expenses:[]};
function save(){localStorage.setItem('rafidainData', JSON.stringify(data));}

function showScreen(title){
  document.getElementById('mainScreen').style.display='none';
  document.getElementById('subScreen').style.display='block';
  document.getElementById('screenTitle').innerText=title;
  let html='';
  
  if(title=='إدارة المنتجات'){
    html=`<input id="pName" placeholder="اسم المنتج"><input id="pPrice" type="number" placeholder="السعر"><button onclick="addP()">اضافة</button><hr>`;
    data.products.forEach((p,i)=>html+=`<p>${i+1}. ${p.name} - ${p.price} د.ع</p>`);
  }
  else if(title=='إدارة العملاء'){
    html=`<input id="cName" placeholder="اسم العميل"><input id="cPhone" placeholder="الهاتف"><button onclick="addC()">اضافة</button><hr>`;
    data.customers.forEach((c,i)=>html+=`<p>${i+1}. ${c.name} - ${c.phone}</p>`);
  }
  else if(title=='إدارة الموردين'){
    html=`<input id="sName" placeholder="اسم المورد"><button onclick="addS()">اضافة</button><hr>`;
    data.suppliers.forEach((s,i)=>html+=`<p>${i+1}. ${s.name}</p>`);
  }
  else if(title=='المصروفات'){
    html=`<input id="eName" placeholder="سبب المصروف"><input id="eAmount" type="number" placeholder="المبلغ"><button onclick="addE()">اضافة</button><hr>`;
    data.expenses.forEach((e,i)=>html+=`<p>${i+1}. ${e.name} - ${e.amount} د.ع</p>`);
  }
  else{
    html=`<p>هاي شاشة ${title}</p><p>جاهزة للبرمجة</p>`;
  }
  
  document.getElementById('screenContent').innerHTML=html;
}
function goBack(){
  document.getElementById('subScreen').style.display='none';
  document.getElementById('mainScreen').style.display='block';
}
function addP(){let n=pName.value,p=pPrice.value; if(n){data.products.push({name:n,price:p});save();showScreen('إدارة المنتجات');}}
function addC(){let n=cName.value,p=cPhone.value; if(n){data.customers.push({name:n,phone:p});save();showScreen('إدارة العملاء');}}
function addS(){let n=sName.value; if(n){data.suppliers.push({name:n});save();showScreen('إدارة الموردين');}}
function addE(){let n=eName.value,a=eAmount.value; if(n){data.expenses.push({name:n,amount:a});save();showScreen('المصروفات');}}
</script>

</body>
</html>
