<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الرافدين ERP - المدير الكامل</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Cairo';background:#F0F2F5}
.header{background:linear-gradient(135deg,#1A4D8F,#2E6DB4);color:white;padding:15px;display:flex;justify-content:space-between;align-items:center;font-size:20px;font-weight:bold;position:sticky;top:0}
.container{padding:20px;max-width:1400px;margin:auto}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.feature-btn{background:white;padding:18px 8px;border-radius:16px;text-align:center;box-shadow:0 4px 12px rgba(0,0,0,.08);cursor:pointer;border:none;font-weight:bold;font-size:13px}
.admin-btn{background:#FFC107!important;color:#000!important}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);justify-content:center;align-items:center;z-index:999}
.modal-content{background:white;padding:20px;border-radius:16px;width:95%;max-width:900px;max-height:90vh;overflow-y:auto}
.btn{background:#1A4D8F;color:white;padding:12px 18px;border:none;border-radius:8px;cursor:pointer;margin:4px;font-weight:bold;font-size:14px}
.btn-sm{padding:6px 10px;font-size:12px}.btn-red{background:#DC3545}.btn-green{background:#28A745}.btn-orange{background:#FD7E14}
input,select{width:100%;padding:10px;margin:6px 0;border:1px solid #ddd;border-radius:8px;font-family:'Cairo'}
table{width:100%;background:white;border-radius:12px;margin-top:15px;border-collapse:collapse;font-size:14px}
table th{background:#1A4D8F;color:white;padding:10px}table td{padding:10px;text-align:center;border-bottom:1px solid #eee}
.login-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#1A4D8F,#2E6DB4);display:flex;justify-content:center;align-items:center;z-index:1000}
.login-box{background:white;padding:25px;border-radius:16px;width:90%;max-width:400px;text-align:center}
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h2>🏦 الرافدين ERP</h2>
    <input id="loginUser" placeholder="اسم المستخدم">
    <input id="loginPass" type="password" placeholder="كلمة السر">
    <button class="btn" onclick="login()">دخول</button>
    <p id="loginError" style="color:red;margin-top:10px"></p>
  </div>
</div>

<div id="mainApp" style="display:none">
  <div class="header">
    <div>🏦 الرافدين ERP</div>
    <div><span id="currentUserSpan"></span> | <a href="#" onclick="logout()" style="color:white">خروج</a></div>
  </div>
  <div class="container">
    <div class="grid" id="mainGrid"></div>
    <div id="contentArea" style="margin-top:20px"></div>
  </div>
</div>

<!-- المودالات -->
<div class="modal" id="addUserModal"><div class="modal-content"><h3 id="userModalTitle">👤 اضافة مستخدم</h3><input id="newUserName" placeholder="اسم المستخدم"><input id="newUserPass" type="password" placeholder="كلمة السر"><select id="newUserRole"><option value="cashier">كاشير</option><option value="admin">ادمن</option></select><button class="btn" onclick="saveNewUser()">حفظ</button><button class="btn btn-red" onclick="closeModal('addUserModal')">الغاء</button></div></div>

<div class="modal" id="addProductModal"><div class="modal-content"><h3 id="prodModalTitle">📦 اضافة منتج</h3><input id="prodName" placeholder="اسم المنتج"><input id="prodPrice" type="number" placeholder="سعر البيع"><input id="prodCost" type="number" placeholder="سعر الشراء"><input id="prodStock" type="number" placeholder="الكمية"><button class="btn" onclick="saveProduct()">حفظ</button><button class="btn btn-red" onclick="closeModal('addProductModal')">الغاء</button></div></div>

<div class="modal" id="newOrderModal"><div class="modal-content"><h3>🛒 فاتورة جديدة</h3><input id="searchProd" placeholder="ابحث عن منتج..." onkeyup="searchProduct()"><div id="productList" style="max-height:300px;overflow:auto"></div><hr><h4>السلة: <span id="cartTotal">0</span> د.ع</h4><div id="cartItems"></div><button class="btn btn-green" onclick="saveOrder()">💾 حفظ</button><button class="btn btn-red" onclick="closeModal('newOrderModal')">الغاء</button></div></div>

<div class="modal" id="editOrderModal"><div class="modal-content"><h3>✏️ تعديل الفاتورة</h3><div id="editOrderContent"></div><button class="btn btn-green" onclick="saveEditOrder()">حفظ التعديل</button><button class="btn btn-red" onclick="closeModal('editOrderModal')">الغاء</button></div></div>

<script>
if(!localStorage.getItem('rafidain_admin_full')){localStorage.clear(); localStorage.setItem('rafidain_admin_full','1');}
let users=JSON.parse(localStorage.getItem('users'))||[{name:'admin',pass:'1234',role:'admin'},{name:'ahmed',pass:'1111',role:'cashier'}];
let products=JSON.parse(localStorage.getItem('products'))||[{id:1,name:'لابتوب',price:750000,cost:700000,stock:10}];
let orders=JSON.parse(localStorage.getItem('orders'))||[];
let currentUser=null; let cart=[]; let editingOrderId=null; let editingProdId=null; let editingUserId=null;

window.onload=function(){if(localStorage.getItem('currentUser')){currentUser=JSON.parse(localStorage.getItem('currentUser')); showApp();}}

function login(){let u=document.getElementById('loginUser').value.trim(); let p=document.getElementById('loginPass').value.trim(); let user=users.find(x=>x.name==u && x.pass==p); if(user){currentUser=user; localStorage.setItem('currentUser',JSON.stringify(user)); showApp();} else{document.getElementById('loginError').innerText='خطأ';}}

function showApp(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('mainApp').style.display='block';
  document.getElementById('currentUserSpan').innerText = currentUser.name + ' - ' + currentUser.role;
  loadButtons();
}

function loadButtons(){
  let html='';
  // ميزات الكاشير
  html+=`<button class="feature-btn" onclick="showNewOrder()">🛒 فاتورة جديدة</button>`;
  html+=`<button class="feature-btn" onclick="showMyOrders()">📋 سجل مبيعاتي</button>`;

  // ميزات المدير الكاملة
  if(currentUser.role=='admin'){
    html+=`<button class="feature-btn admin-btn" onclick="showDashboard()">📊 لوحة التحكم</button>`;
    html+=`<button class="feature-btn admin-btn" onclick="showProducts()">📦 ادارة المخزن</button>`;
    html+=`<button class="feature-btn admin-btn" onclick="showAllOrders()">📑 كل الفواتير</button>`;
    html+=`<button class="feature-btn admin-btn" onclick="showUsers()">👥 ادارة المستخدمين</button>`;
    html+=`<button class="feature-btn admin-btn" onclick="showReports()">📈 التقارير</button>`;
  }
  document.getElementById('mainGrid').innerHTML=html;
}

// ========== 1. ادارة المخزن - حذف وتعديل ==========
function showProducts(){
  let html='<h3>📦 ادارة المخزن</h3><button class="btn btn-green" onclick="showAddProduct()">+ اضافة منتج</button><table><tr><th>المنتج</th><th>سعر البيع</th><th>سعر الشراء</th><th>الكمية</th><th>اجراءات</th></tr>';
  products.forEach(p=>html+=`<tr><td>${p.name}</td><td>${p.price.toLocaleString()}</td><td>${p.cost.toLocaleString()}</td><td>${p.stock}</td><td>
    <button class="btn-sm btn-orange" onclick="editProduct(${p.id})">✏️ تعديل</button>
    <button class="btn-sm btn-red" onclick="deleteProduct(${p.id})">🗑️ حذف</button>
    </td></tr>`);
  document.getElementById('contentArea').innerHTML=html+'</table>';
}
function showAddProduct(){editingProdId=null; document.getElementById('prodModalTitle').innerText='📦 اضافة منتج'; document.getElementById('prodName').value=''; document.getElementById('prodPrice').value=''; document.getElementById('prodCost').value=''; document.getElementById('prodStock').value=''; openModal('addProductModal')}
function editProduct(id){editingProdId=id; let p=products.find(x=>x.id==id); document.getElementById('prodModalTitle').innerText='✏️ تعديل منتج'; document.getElementById('prodName').value=p.name; document.getElementById('prodPrice').value=p.price; document.getElementById('prodCost').value=p.cost; document.getElementById('prodStock').value=p.stock; openModal('addProductModal')}
function deleteProduct(id){if(confirm('متأكد تحذف المنتج؟')){products=products.filter(p=>p.id!=id); localStorage.setItem('products',JSON.stringify(products)); alert('تم الحذف'); showProducts();}}
function saveProduct(){
  let data={id:editingProdId||Date.now(),name:document.getElementById('prodName').value,price:+document.getElementById('prodPrice').value,cost:+document.getElementById('prodCost').value,stock:+document.getElementById('prodStock').value};
  if(editingProdId){let i=products.findIndex(p=>p.id==editingProdId); products[i]=data;} else {products.push(data);}
  localStorage.setItem('products',JSON.stringify(products)); alert('تم الحفظ'); closeModal('addProductModal'); showProducts();
}

// ========== 2. كل الفواتير - حذف وتعديل ==========
function showAllOrders(){
  let html='<h3>📑 كل الفواتير</h3><table><tr><th>رقم</th><th>المبلغ</th><th>الربح</th><th>الكاشير</th><th>التاريخ</th><th>اجراءات</th></tr>';
  orders.forEach(o=>html+=`<tr><td>${o.id}</td><td>${o.total.toLocaleString()}</td><td style="color:green">${o.profit.toLocaleString()}</td><td>${o.cashier}</td><td>${o.date}</td><td>
    <button class="btn-sm btn-orange" onclick="editOrder(${o.id})">✏️ تعديل</button>
    <button class="btn-sm btn-red" onclick="deleteOrder(${o.id})">🗑️ حذف</button>
    </td></tr>`);
  document.getElementById('contentArea').innerHTML=html+'</table>'
}
function deleteOrder(id){
  if(confirm('متأكد تحذف الفاتورة؟')){
    let order=orders.find(o=>o.id==id);
    order.items.forEach(i=>{let p=products.find(x=>x.id==i.id); if(p)p.stock++;}); // رجع للمخزن
    orders=orders.filter(o=>o.id!=id);
    localStorage.setItem('orders',JSON.stringify(orders));
    localStorage.setItem('products',JSON.stringify(products));
    alert('تم الحذف'); showAllOrders();
  }
}
function editOrder(id){editingOrderId=id; let order=orders.find(o=>o.id==id); cart=[...order.items]; let html='<input id="searchProdEdit" placeholder="ابحث واضف منتج" onkeyup="searchProductEdit()"><div id="productListEdit"></div><hr><h4>السلة: <span id="editCartTotal">0</span></h4><div id="editCartItems"></div>'; document.getElementById('editOrderContent').innerHTML=html; updateEditCart(); openModal('editOrderModal');}
function searchProductEdit(){let val=document.getElementById('searchProdEdit').value.toLowerCase(); let html=''; products.filter(p=>p.name.includes(val)).forEach(p=>html+=`<div style="display:flex;justify-content:space-between;padding:8px"><span>${p.name}</span><button class="btn-sm" onclick="addToEditCart(${p.id})">+</button></div>`); document.getElementById('productListEdit').innerHTML=html;}
function addToEditCart(id){let prod=products.find(p=>p.id==id); if(prod.stock>0){cart.push({...prod}); prod.stock--; localStorage.setItem('products',JSON.stringify(products)); updateEditCart();}}
function updateEditCart(){let total=cart.reduce((sum,i)=>sum+i.price,0); document.getElementById('editCartTotal').innerText=total.toLocaleString(); document.getElementById('editCartItems').innerHTML=cart.map((i,idx)=>`<div>${i.name} <button onclick="removeFromEditCart(${idx})">x</button></div>`).join('');}
function removeFromEditCart(i){let prod=products.find(p=>p.id==cart[i].id); prod.stock++; cart.splice(i,1); localStorage.setItem('products',JSON.stringify(products)); updateEditCart();}
function saveEditOrder(){let idx=orders.findIndex(o=>o.id==editingOrderId); let total=cart.reduce((sum,i)=>sum+i.price,0); let cost=cart.reduce((sum,i)=>sum+i.cost,0); orders[idx]={...orders[idx],total:total,cost:cost,profit:total-cost,items:cart}; localStorage.setItem('orders',JSON.stringify(orders)); localStorage.setItem('products',JSON.stringify(products)); alert('تم التعديل'); closeModal('editOrderModal'); showAllOrders();}

// ========== 3. ادارة المستخدمين - حذف وتعديل ==========
function showUsers(){
  let html='<h3>👥 ادارة المستخدمين</h3><button class="btn btn-green" onclick="showAddUser()">+ اضافة مستخدم</button><table><tr><th>الاسم</th><th>الدور</th><th>اجراءات</th></tr>';
  users.forEach((u,i)=>html+=`<tr><td>${u.name}</td><td>${u.role}</td><td>
    ${u.name!='admin'?`<button class="btn-sm btn-orange" onclick="editUser(${i})">✏️ تعديل</button> <button class="btn-sm btn-red" onclick="deleteUser(${i})">🗑️ حذف</button>`:''}
    </td></tr>`);
  document.getElementById('contentArea').innerHTML=html+'</table>';
}
function showAddUser(){editingUserId=null; document.getElementById('userModalTitle').innerText='👤 اضافة مستخدم'; document.getElementById('newUserName').value=''; document.getElementById('newUserPass').value=''; openModal('addUserModal')}
function editUser(i){editingUserId=i; document.getElementById('userModalTitle').innerText='✏️ تعديل مستخدم'; document.getElementById('newUserName').value=users[i].name; document.getElementById('newUserPass').value=users[i].pass; document.getElementById('newUserRole').value=users[i].role; openModal('addUserModal')}
function deleteUser(i){if(confirm('حذف المستخدم؟')){users.splice(i,1); localStorage.setItem('users',JSON.stringify(users)); showUsers();}}
function saveNewUser(){let data={name:document.getElementById('newUserName').value,pass:document.getElementById('newUserPass').value,role:document.getElementById('newUserRole').value}; if(editingUserId!==null){users[editingUserId]=data;} else {users.push(data);} localStorage.setItem('users',JSON.stringify(users)); alert('تم'); closeModal('addUserModal'); showUsers();}

// ========== ميزات الكاشير ==========
function showNewOrder(){cart=[]; searchProduct(); openModal('newOrderModal');}
function searchProduct(){let val=document.getElementById('searchProd').value.toLowerCase(); let html=''; products.filter(p=>p.name.includes(val)).forEach(p=>html+=`<div style="display:flex;justify-content:space-between;padding:8px"><span>${p.name} - ${p.price.toLocaleString()}</span><button class="btn-sm" onclick="addToCart(${p.id})">+</button></div>`); document.getElementById('productList').innerHTML=html;}
function addToCart(id){let prod=products.find(p=>p.id==id); if(prod.stock>0){cart.push({...prod}); prod.stock--; localStorage.setItem('products',JSON.stringify(products)); updateCart();}}
function updateCart(){let total=cart.reduce((sum,i)=>sum+i.price,0); document.getElementById('cartTotal').innerText=total.toLocaleString(); document.getElementById('cartItems').innerHTML=cart.map(i=>`<div>${i.name}</div>`).join('');}
function saveOrder(){if(cart.length==0)return; let total=cart.reduce((sum,i)=>sum+i.price,0); let cost=cart.reduce((sum,i)=>sum+i.cost,0); orders.push({id:Date.now(),total:total,cost:cost,profit:total-cost,cashier:currentUser.name,date:new Date().toLocaleString('ar-IQ'),items:cart}); localStorage.setItem('orders',JSON.stringify(orders)); alert('تم'); closeModal('newOrderModal');}
function showMyOrders(){let my=orders.filter(o=>o.cashier==currentUser.name); let html='<h3>📋 سجل مبيعاتي</h3><table><tr><th>رقم</th><th>المبلغ</th><th>التاريخ</th></tr>'; my.forEach(o=>html+=`<tr><td>${o.id}</td><td>${o.total.toLocaleString()}</td><td>${o.date}</td></tr>`); document.getElementById('contentArea').innerHTML=html+'</table>'}
function showDashboard(){document.getElementById('contentArea').innerHTML='<h3>📊 لوحة التحكم</h3>';}
function showReports(){document.getElementById('contentArea').innerHTML='<h3>📈 التقارير</h3>';}

function openModal(id){document.getElementById(id).style.display='flex'}
function closeModal(id){document.getElementById(id).style.display='none'}
function logout(){localStorage.removeItem('currentUser');location.reload()}
</script>
</body></html>
