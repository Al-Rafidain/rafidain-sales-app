<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <title>شركة الرافدين</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{background:#7c3aed;margin:0;font-family:'Cairo',sans-serif}
    .container{background:#fff;border-radius:20px 20px 0 0;padding:20px;margin-top:50px;min-height:100vh}
    .logo{text-align:center;margin:-70px 0 20px}
    .logo img{width:80px;height:80px;border-radius:20px;box-shadow:0 4px 10px rgba(0,0,0,.2)}
    h1{text-align:center;color:#4c1d95;font-size:24px;margin:10px 0}
    p{text-align:center;color:#666;margin-bottom:30px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .btn{background:#f3f0ff;border:none;padding:15px;border-radius:12px;font-size:14px;cursor:pointer;width:100%}
    .btn:active{background:#ddd6fe}
  </style>
</head>
<body>
  <div class="container">
    <div class="logo"><img src="logo-192.png" alt="الرافدين"></div>
    <h1>شركة الرافدين</h1>
    <p>نظام إدارة المبيعات المتكامل</p>
    <div class="grid">
      <button class="btn" onclick="location.href='customers.html'">1. إدارة العملاء</button>
      <button class="btn" onclick="location.href='products.html'">2. إدارة المنتجات</button>
      <button class="btn" onclick="location.href='invoices.html'">3. فواتير المبيعات</button>
      <button class="btn" onclick="location.href='returns.html'">4. المرجعات</button>
      <button class="btn" onclick="location.href='daily.html'">5. تقارير يومية</button>
      <button class="btn" onclick="location.href='monthly.html'">6. تقارير شهرية</button>
      <button class="btn" onclick="location.href='stock.html'">7. إدارة المخزن</button>
      <button class="btn" onclick="alert('قريباً')">8. تنبيهات نفاد المخزون</button>
      <button class="btn" onclick="alert('قريباً')">9. باركود المنتجات</button>
      <button class="btn" onclick="alert('قريباً')">10. طباعة الفواتير</button>
      <button class="btn" onclick="alert('قريباً')">11. حسابات العملاء</button>
      <button class="btn" onclick="alert('قريباً')">12. الدفع الآجل</button>
      <button class="btn" onclick="alert('قريباً')">13. خصومات وعروض</button>
      <button class="btn" onclick="alert('قريباً')">14. صلاحيات المستخدمين</button>
      <button class="btn" onclick="alert('قريباً')">15. نسخ احتياطي</button>
      <button class="btn" onclick="alert('قريباً')">16. بحث سريع</button>
      <button class="btn" onclick="alert('قريباً')">17. يعمل بدون انترنت</button>
      <button class="btn" onclick="alert('قريباً')">18. مزامنة تلقائية</button>
      <button class="btn" onclick="alert('قريباً')">19. واجهة عربية</button>
      <button class="btn" onclick="alert('قريباً')">20. دعم فني</button>
      <button class="btn" onclick="alert('قريباً')">21. امان عالي</button>
      <button class="btn" onclick="alert('قريباً')">22. تحديثات مستمرة</button>
    </div>
  </div>
</body>
</html>
