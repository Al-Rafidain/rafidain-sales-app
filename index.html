<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رافدين سيلز</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Cairo', sans-serif; } </style>
</head>
<body class="bg-gray-100">

    <div id="app"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDnryQ2sFm7Rudel7z_xOpVtdXUcxFceHQ",
          authDomain: "rafidain-sales.firebaseapp.com",
          projectId: "rafidain-sales",
          storageBucket: "rafidain-sales.firebasestorage.app",
          messagingSenderId: "161657937115",
          appId: "1:161657937115:web:94c2af2801877edea400fe"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appDiv = document.getElementById('app');
        let errorMsg = "";

        function showLogin() {
            appDiv.innerHTML = `
            <div class="min-h-screen flex items-center justify-center p-4">
                <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-sm">
                    <h1 class="text-3xl font-bold text-center mb-2 text-blue-700">رافدين سيلز</h1>
                    <p class="text-center text-gray-500 mb-6">نظام ادارة المبيعات</p>
                    ${errorMsg ? `<p class="bg-red-100 text-red-700 p-2 rounded mb-4 text-center">${errorMsg}</p>` : ''}
                    <input id="email" type="email" placeholder="الايميل" class="w-full p-3 border rounded-lg mb-4">
                    <input id="password" type="password" placeholder="كلمة السر" class="w-full p-3 border rounded-lg mb-4">
                    <button id="loginBtn" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold hover:bg-blue-700">تسجيل دخول</button>
                    <button id="signupBtn" class="w-full bg-gray-200 text-gray-700 p-3 rounded-lg mt-3 font-bold hover:bg-gray-300">انشاء حساب جديد</button>
                </div>
            </div>`;
            
            document.getElementById('loginBtn').onclick = login;
            document.getElementById('signupBtn').onclick = signup;
            errorMsg = "";
        }

        function showDashboard(user) {
            appDiv.innerHTML = `
            <div class="p-6 max-w-4xl mx-auto">
                <div class="flex justify-between items-center mb-6">
                    <h1 class="text-3xl font-bold">مرحبا بك</h1>
                    <button id="logoutBtn" class="bg-red-500 text-white px-4 py-2 rounded-lg">تسجيل خروج</button>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow">
                    <p class="text-lg">الايميل: ${user.email}</p>
                    <p class="mt-4 text-green-600 font-bold">🎉 مبروك! التطبيق متصل بالـ Firebase بنجاح</p>
                    <p class="mt-2 text-gray-600">الخطوة الجاية: نضيف صفحة المنتجات والفواتير</p>
                </div>
            </div>`;
            document.getElementById('logoutBtn').onclick = () => signOut(auth);
        }

        async function login() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (error) {
                errorMsg = "الايميل او كلمة السر خطأ";
                showLogin();
            }
        }

        async function signup() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try {
                await createUserWithEmailAndPassword(auth, email, pass);
            } catch (error) {
                errorMsg = "هذا الايميل مستخدم من قبل";
                showLogin();
            }
        }

        onAuthStateChanged(auth, user => {
            if (user) showDashboard(user);
            else showLogin();
        });

    </script>
</body>
</html>
