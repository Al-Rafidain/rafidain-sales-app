<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شركة الرافدين</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#6d28d9">
<style>
  body{margin:0; font-family:Tahoma; background:linear-gradient(180deg, #4c1d95 0%, #7c3aed 100%); min-height:100vh; padding:15px;}
 .container{max-width:500px; margin:auto; background:white; border-radius:20px; padding:20px; box-shadow:0 10px 30px rgba(0,0,0,0.3);}
  h1{color:#6d28d9; text-align:center; margin:5px 0;}
 .grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
 .btn{background:#6d28d9; color:white; border:none; padding:14px 5px; border-radius:12px; cursor:pointer; font-size:13px; font-weight:bold;}
 .btn:active{background:#5b21b6; transform:scale(0.97);}
  #subScreen{display:none;}
  input{width:92%; padding:10px; margin:5px 0; border:1px solid #ccc; border-radius:8px;}
 .backBtn{background:#64748b; width:100%; padding:12px; color:white; border:none; border-radius:8px; margin-top:10px; font-weight:bold;}
</style>
</head>
<body>

<div class="container" id="mainScreen">
  <h1>شركة الرافدين</h1>
  <div class="grid">
    <button class="btn" data-id="1">1. إدارة العملاء</button>
    <button class="btn" data-id="2">2. إدارة المنتجات</button>
    <button class="btn" data-id="3">3. فواتير المبيعات</button>
    <button class="btn" data-id="4">4. المرتجعات</button>
    <button class="btn" data-id="5">5. تقارير يومية</button>
    <button class="btn" data-id="6">6. تقارير شهرية</button>
    <button class="btn" data-id="7">7. إدارة المخزن</button>
    <button class="btn" data-id="8">8. تنبيهات المخزون</button>
    <button class="btn" data-id="9">9. باركود المنتجات</button>
    <button class="btn" data-id="10">10. طباعة الفواتير</button>
    <button class="btn" data-id="11">11. حسابات العملاء</button>
    <button class="btn" data-id="12">12. الدفع الآجل</button>
    <button class="btn" data-id="13">13. خصومات وعروض</button>
    <button class="btn" data-id="14">14. صلاحيات المستخدمين</button>
    <button class="btn" data-id="15">15. إدارة الموردين</button>
    <button class="btn" data-id="16">16. فواتير المشتريات</button>
    <button class="btn" data-id="17">17. المصروفات</button>
    <button class="btn" data-id="18">18. الجرد</button>
    <button class="btn" data-id="19">19. الحسابات</button>
    <button class="btn" data-id="20">20. إدارة الفئات</button>
    <button class="btn" data-id="21">21. النسخ الاحتياطي</button>
    <button class="btn" data-id="22">22. إعدادات النظام</button>
  </div>
</div>

<div class="container" id="subScreen">
  <h2 id="screenTitle" style="color:#6d28d9; text-align:center;"></h2>
  <div id="screenContent"></div>
  <button class="backBtn" id="backBtn">رجوع للقائمة</button>
</div>

<script>
let db = JSON.parse(localStorage.getItem('rafidainDB')) || {products:[], customers:[], suppliers:[], sales:[], purchases:[], expenses:[], categories:[], users:[{u:"admin",p:"123"}]};
function save(){localStorage.setItem('rafidainDB', JSON.stringify(db));}

const screens = {
 1: {t:"إدارة العملاء", h:`<input id="cn" placeholder="اسم العميل"><input id="cp" placeholder="الهاتف"><button id="addC">+ اضافة</button><hr>`},
 2: {t:"إدارة المنتجات", h:`<input id="pn" placeholder="اسم المنتج"><input id="pp" type="number" placeholder="السعر"><button id="addP">+ اضافة</button><hr>`},
  3: {t:"فواتير المبيعات", h:`<button id="newSale">+ فاتورة جديدة</button><hr>`},
 4: {t:"المرتجعات", h:`<button id="ret">ارجاع اخر فاتورة</button>`},
  5: {t:"تقارير يومية", h:`<p>المبيعات: ${db.sales.length}</p>`},
  6: {t:"تقارير شهرية", h:`<p>تقرير الشهر</p>`},
  7: {t:"إدارة المخزن", h:`<p>عدد المنتجات: ${db.products.length}</p>`},
 8: {t:"تنبيهات المخزون", h:`<p>المخزون سليم</p>`},
 9: {t:"باركود المنتجات", h:`<p>طباعة باركود</p>`},
  10:{t:"طباعة الفواتير", h:`<button onclick="print()">طباعة</button>`},
  11:{t:"حسابات العملاء", h:`<p>ذمم العملاء</p>`},
  12:{t:"الدفع الآجل", h:`<p>الفواتير الآجلة</p>`},
  13:{t:"خصومات وعروض", h:`<input placeholder="نسبة الخصم"><button>حفظ</button>`},
  14:{t:"صلاحيات المستخدمين", h:`<input id="un" placeholder="مستخدم"><input id="up" placeholder="كلمة سر"><button id="addU">اضافة</button>`},
  15:{t:"إدارة الموردين", h:`<input id="sn" placeholder="اسم المورد"><button id="addS">+ اضافة</button><hr>`},
 16:{t:"فواتير المشتريات", h:`<button id="newPur">+ فاتورة شراء</button><hr>`},
  17:{t:"المصروفات", h:`<input id="en" placeholder="السبب"><input id="ea" type="number" placeholder="المبلغ"><button id="addE">+ اضافة</button><hr>`},
  18:{t:"الجرد", h:`<button>بدء الجرد</button>`},
 19:{t:"الحسابات", h:`<p>الخزينة والبنك</p>`},
  20:{t:"إدارة الفئات", h:`<input id="catn" placeholder="اسم الفئة"><button id="addCat">+ اضافة</button><hr>`},
  21:{t:"النسخ الاحتياطي", h:`<button id="down">تحميل نسخة</button>`},
  22:{t:"إعدادات النظام", h:`<input placeholder="اسم الشركة"><button>حفظ</button>`},
}

function showScreen(id){
  document.getElementById('mainScreen').style.display='none';
  document.getElementById('subScreen').style.display='block';
  document.getElementById('screenTitle').innerText=screens[id].t;
  document.getElementById('screenContent').innerHTML=screens[id].h;

  // ربط الازرار الداخلية
  if(document.getElementById('addC')) document.getElementById('addC').onclick=()=>{if(cn.value){db.customers.push({n:cn.value,p:cp.value});save();showScreen(1);}};
  if(document.getElementById('addP')) document.getElementById('addP').onclick=()=>{if(pn.value){db.products.push({n:pn.value,p:pp.value});save();showScreen(2);}};
  if(document.getElementById('addS')) document.getElementById('addS').onclick=()=>{if(sn.value){db.suppliers.push({n:sn.value});save();showScreen(15);}};
  if(document.getElementById('addE')) document.getElementById('addE').onclick=()=>{if(en.value){db.expenses.push({n:en.value,a:ea.value});save();showScreen(17);}};
  if(document.getElementById('addCat')) document.getElementById('addCat').onclick=()=>{if(catn.value){db.categories.push(catn.value);save();showScreen(20);}};
  if(document.getElementById('addU')) document.getElementById('addU').onclick=()=>{if(un.value){db.users.push({u:un.value,p:up.value});save();alert('تم');}};
  if(document.getElementById('newSale')) document.getElementById('newSale').onclick=()=>{db.sales.push({d:Date()});save();alert('تم انشاء فاتورة');showScreen(3);};
  if(document.getElementById('newPur')) document.getElementById('newPur').onclick=()=>{db.purchases.push({d:Date()});save();alert('تم');showScreen(16);};
  if(document.getElementById('ret')) document.getElementById('ret').onclick=()=>{db.sales.pop();save();alert('تم الارجاع');};
  if(document.getElementById('down')) document.getElementById('down').onclick=()=>{let a=document.createElement('a');a.href='data:text/json,'+JSON.stringify(db);a.download='backup.json';a.click();};
}

function goBack(){
  document.getElementById('subScreen').style.display='none';
  document.getElementById('mainScreen').style.display='block';
}

document.addEventListener('DOMContentLoaded', function(){
  document.querySelectorAll('.btn').forEach(btn => {
    btn.addEventListener('click', function(){
      showScreen(this.getAttribute('data-id'));
    });
  });
  document.getElementById('backBtn').addEventListener('click', goBack);
});
</script>
</body>
</html>
