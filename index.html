<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام الرافدين للمبيعات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Cairo';background:#F0F2F5}
.header{background:linear-gradient(135deg,#1A4D8F,#2E6DB4);color:white;padding:15px;display:flex;justify-content:space-between;align-items:center;font-size:20px;font-weight:bold}
.container{padding:20px;max-width:1400px;margin:auto}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:white;padding:15px;border-radius:16px;text-align:center;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.stat-card h3{color:#1A4D8F;font-size:24px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.feature-btn{background:white;padding:15px 8px;border-radius:16px;text-align:center;box-shadow:0 4px 12px rgba(0,0,0,.08);cursor:pointer;border:none;font-family:'Cairo';font-weight:bold;font-size:13px}
.admin-btn{background:#FFC107!important;color:#000!important}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);justify-content:center;align-items:center;z-index:999}
.modal-content{background:white;padding:25px;border-radius:16px;width:95%;max-width:800px;max-height:90vh;overflow-y:auto}
.btn{background:#1A4D8F;color:white;padding:12px;border:none;border-radius:8px;cursor:pointer;width:100%;margin-top:8px;font-weight:bold}
input,select{width:100%;padding:10px;margin:6px 0;border:1px solid #ddd;border-radius:8px;font-family:'Cairo'}
table{width:100%;background:white;border-radius:12px;margin-top:15px;border-collapse:collapse}
table th{background:#1A4D8F;color:white;padding:10px}
table td{padding:10px;text-align:center;border-bottom:1px solid #eee}
.login-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#1A4D8F,#2E6DB4);display:flex;justify-content:center;align-items:center;z-index:1000}
.login-box{background:white;padding:30px;border-radius:16px;width:90%;max-width:400px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.2)}
.login-box h2{color:#1A4D8F;margin-bottom:15px}
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h2>🏦 الرافدين للمبيعات</h2>
    <input id="loginUser" placeholder="اسم المستخدم">
    <input id="loginPass" type="password" placeholder="كلمة السر">
    <button class="btn" onclick="login()">دخول</button>
    <p id="loginError" style="color:red;margin-top:10px"></p>
    <hr style="margin:15px 0">
    <button class="btn" style="background:#28A745" onclick="showAddUser()">➕ اضافة مستخدم جديد</button>
  </div>
</div>

<div id="mainApp" style="display:none">
<div class="header">
  <div>🏦 الرافدين للمبيعات</div>
  <div><span id="currentUserSpan"></span> | <a href="#" onclick="logout()" style="color:white">خروج</a></div>
</div>
<div class="container">
<div class="stats">
<div class="stat-card"><h3 id="totalOrders">0</h3><p>📦 الطلبات</p></div>
<div class="stat-card"><h3 id="totalRevenue">0</h3><p>💰 الايراد</p></div>
<div class="stat-card"><h3 id="totalCustomers">0</h3><p>👥 العملاء</p></div>
<div class="stat-card"><h3 id="totalDebt">0</h3><p>📉 الديون</p></div>
</div>
<div class="grid" id="mainGrid"></div>
<div id="contentArea" style="margin-top:20px"></div>
</div>
</div>

<div class="modal" id="addUserModal"><div class="modal-content"><h3>اضافة مستخدم</h3><input id="newUserName" placeholder="اسم المستخدم"><input id="newUserPass" type="password" placeholder="كلمة السر"><select id="newUserRole"><option value="cashier">كاشير</option><option value="admin">ادمن</option></select><button class="btn" onclick="addUser()">حفظ</button><button class="btn" style="background:#DC3545" onclick="closeModal('addUserModal')">الغاء</button></div></div>
<div class="modal" id="orderModal"><div class="modal-content"><h3>طلب جديد</h3><input id="orderProduct" placeholder="اسم المنتج"><input id="orderPrice" type="number" placeholder="السعر"><input id="orderQty" type="number" value="1" placeholder="الكمية"><button class="btn" onclick="addToCart()">اضافة للسلة</button><div id="cartList"></div><h4>الاجمالي: <span id="cartTotal">0</span> د.ع</h4><button class="btn" style="background:#28A745" onclick="completeOrder()">حفظ الطلب</button><button class="btn" style="background:#DC3545" onclick="closeModal('orderModal')">الغاء</button></div></div>

<script>
let users=JSON.parse(localStorage.getItem('users'))||[{name:'admin',pass:'1234',role:'admin'}];
let orders=JSON.parse(localStorage.getItem('orders'))||[];
let customers=JSON.parse(localStorage.getItem('customers'))||[];
let products=JSON.parse(localStorage.getItem('products'))||[];
let cart=[]; let currentUser=null;

window.onload=function(){if(localStorage.getItem('currentUser')){currentUser=JSON.parse(localStorage.getItem('currentUser'));showApp()}}

function login(){
  let u=document.getElementById('loginUser').value;
  let p=document.getElementById('loginPass').value;
  let user=users.find(x=>x.name==u && x.pass==p);
  if(user){currentUser=user;localStorage.setItem('currentUser',JSON.stringify(user));showApp()} 
  else{document.getElementById('loginError').innerText='اسم او كلمة سر خطأ'}
}

function showApp(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('mainApp').style.display='block';
  document.getElementById('currentUserSpan').innerText=currentUser.name;
  loadButtons(); updateStats();
}

function loadButtons(){
  let html='';
  html+=`<button class="feature-btn" onclick="openModal('orderModal')">🛒➕<br>طلب جديد</button>`;
  html+=`<button class="feature-btn" onclick="alert('قريبا')">📦<br>المنتجات</button>`;
  html+=`<button class="feature-btn" onclick="showOrders()">📋<br>سجل الطلبات</button>`;
  if(currentUser.role=='admin'){
    html+=`<button class="feature-btn admin-btn" onclick="showAdminPanel()">👑<br>لوحة الادارة</button>`;
    html+=`<button class="feature-btn" onclick="showAddUser()">👤➕<br>اضافة مستخدم</button>`;
  }
  document.getElementById('mainGrid').innerHTML=html;
}

function showAdminPanel(){
  let html='<h3>📊 تقرير الكاشيرين</h3><table><tr><th>الاسم</th><th>الدور</th><th>الطلبات</th><th>الايراد</th></tr>';
  users.forEach(u=>{let cOrders=orders.filter(o=>o.cashier==u.name);let total=cOrders.reduce((s,o)=>s+o.total,0);html+=`<tr><td>${u.name}</td><td>${u.role}</td><td>${cOrders.length}</td><td>${total} د.ع</td></tr>`});
  document.getElementById('contentArea').innerHTML=html+'</table>';
}

function addUser(){users.push({name:document.getElementById('newUserName').value,pass:document.getElementById('newUserPass').value,role:document.getElementById('newUserRole').value});localStorage.setItem('users',JSON.stringify(users));alert('تمت الاضافة');closeModal('addUserModal')}
function showAddUser(){openModal('addUserModal')}
function openModal(id){document.getElementById(id).style.display='flex'}
function closeModal(id){document.getElementById(id).style.display='none'}
function logout(){localStorage.removeItem('currentUser');location.reload()}
function addToCart(){cart.push({product:document.getElementById('orderProduct').value,price:+document.getElementById('orderPrice').value,qty:+document.getElementById('orderQty').value});showCart()}
function showCart(){let html='<h4>السلة</h4>';let total=0;cart.forEach(i=>{total+=i.price*i.qty;html+=`<p>${i.product} x${i.qty} = ${i.price*i.qty} د.ع</p>`});document.getElementById('cartList').innerHTML=html;document.getElementById('cartTotal').innerText=total}
function completeOrder(){orders.push({id:'RAF'+Date.now(),items:cart,total:cart.reduce((s,i)=>s+i.price*i.qty,0),date:new Date().toLocaleString('ar-IQ'),cashier:currentUser.name});localStorage.setItem('orders',JSON.stringify(orders));cart=[];closeModal('orderModal');updateStats()}
function showOrders(){let html='<h3>سجل الطلبات</h3><table><tr><th>رقم الفاتورة</th><th>المبلغ</th><th>الكاشير</th></tr>';orders.forEach(o=>html+=`<tr><td>${o.id}</td><td>${o.total} د.ع</td><td>${o.cashier}</td></tr>`);document.getElementById('contentArea').innerHTML=html+'</table>'}
function updateStats(){document.getElementById('totalOrders').innerText=orders.length;document.getElementById('totalRevenue').innerText=orders.reduce((s,o)=>s+o.total,0)+' د.ع';document.getElementById('totalCustomers').innerText=customers.length;document.getElementById('totalDebt').innerText='0 د.ع'}
</script>
</body></html>
