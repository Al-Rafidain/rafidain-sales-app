<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>شركة الرافدين للمبيعات v16.0</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Amiri:wght@700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;font-family:'Cairo',sans-serif}
body{background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);margin:0;padding:10px;min-height:100vh;padding-bottom:130px}
.box{background:rgba(255,255,255,0.95);backdrop-filter: blur(10px);max-width:550px;margin:15px auto;padding:20px;border-radius:20px;box-shadow:0 15px 50px rgba(0,0,0,0.3)}
.header{background: linear-gradient(90deg, #1e3c72 0%, #2a5298 100%);color:#fff;padding:15px;border-radius:12px;margin-bottom:15px;text-align:center;font-size:20px;font-weight:900}
input,button,select{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:10px;font-size:15px}
button{cursor:pointer;font-weight:700;border:none}
.btn-add{background: linear-gradient(90deg, #1e3c72 0%, #2a5298 100%);color:#fff}
.btn-save{background: linear-gradient(90deg, #11998e 0%, #38ef7d 100%);color:#fff}
.btn-edit{background: #ffc107;color:#000;padding:6px 10px;font-size:12px;width:auto}
.btn-back{background:#6c757d;color:#fff}.btn-admin{background: linear-gradient(90deg, #f7971e 0%, #ffd200 100%);color:#000}
.btn-delete{background:#dc3545;color:#fff;padding:6px 10px;border-radius:8px;width:auto;font-size:12px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.card{background:#ffffff;color:#1e3c72;border:2px solid #ffd700;border-radius:15px;padding:12px 5px;text-align:center;font-size:11px;font-weight:700;min-height:70px}
.card:hover{background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);color:#fff}
.card.red{background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);color:#fff;border-color:#eb3349}
.hidden{display:none}
.item-card{background:#f0f8ff;padding:12px;border-radius:10px;margin:8px 0;font-size:13px;border-right:4px solid #2a5298;display:flex;justify-content:space-between;align-items:center}
.logo-text{font-family:'Amiri',serif;font-size:32px;font-weight:900;color:#2a5298}
.footer{position:fixed;bottom:0;left:0;right:0;background: linear-gradient(90deg, #1e3c72 0%, #2a5298 100%);color:#fff;text-align:center;padding:12px;font-size:12px;z-index:999;border-top:3px solid #ffd700}
.about-box{background:#e8f5ff;padding:15px;border-radius:10px;text-align:center;line-height:2;border:2px solid #ffd700}
.actions{display:flex;gap:5px}
.pos-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.pos-item{background:#fff;border:2px solid #2a5298;padding:10px;border-radius:10px;text-align:center;cursor:pointer}
</style>
</head>
<body>

<div class="box" id="loginScreen">
  <div class="header">تسجيل الدخول</div>
  <input type="text" id="username" placeholder="اسم المستخدم">
  <input type="password" id="password" placeholder="كلمة السر">
  <button class="btn-add" onclick="login()">دخول</button>
  <p id="loginError" style="color:red;text-align:center"></p>
</div>

<div class="box hidden" id="mainApp">
  <div class="header" style="background:#fff;color:#2a5298">
    <div class="logo-text">الرافدين</div>
    <div style="font-size:14px;color:#555">العراق</div>
    <div style="font-size:14px;color:#666" id="welcomeStore">اسم المحل</div>
  </div>
  
  <div class="grid" id="menuGrid">
    <button class="card" onclick="showPage('products')">المنتجات</button>
    <button class="card" onclick="showPage('pos')">نقطة البيع</button>
    <button class="card" onclick="showPage('invoices')">الفواتير</button>
    <button class="card" onclick="showPage('invoice')">فاتورة جديدة</button>
    <button class="card" onclick="showPage('addCustomer')">اضافة زبون</button>
    <button class="card" onclick="showPage('customers')">الزبائن</button>
    <button class="card" onclick="showPage('debts')">الديون</button>
    <button class="card" onclick="showPage('expenses')">المصروفات</button>
    <button class="card" onclick="showPage('cashbox')">الصندوق</button>
    <button class="card" onclick="showPage('income')">الايرادات</button>
    <button class="card" onclick="showPage('inventory')">الجرد</button>
    <button class="card" onclick="showPage('reports')">التقارير</button>
    <button class="card" onclick="showPage('employees')">الموظفين</button>
    <button class="card" onclick="showPage('suppliers')">الموردين</button>
    <button class="card" onclick="showPage('branches')">ادارة الفروع</button>
    <button class="card" onclick="showPage('broadcast')">ارسال جماعي</button>
    <button class="card" onclick="showPage('ai')">توقع المبيعات</button>
    <button class="card" onclick="showPage('backup')">النسخ الاحتياطي</button>
    <button class="card" onclick="showPage('logs')">سجل الحركات</button>
    <button class="card" onclick="showPage('settings')">الاعدادات</button>
    <button class="card btn-admin" onclick="showPage('admin')">لوحة الادمن</button>
    <button class="card" onclick="showAbout()">حول</button>
    <button class="card" onclick="toggleDark()">وضع ليلي</button>
    <button class="card red" onclick="logout()">تسجيل</button>
  </div>
  <div id="pageContent" class="hidden"></div>
</div>

<div class="footer">
  <div class="logo-text" style="font-size:18px;color:#ffd700">الرافدين</div>
  <div>جميع الحقوق محفوظة لدى شركة الرافدين للمبيعات © <span id="year"></span></div>
</div>

<script>
const VERSION = "v16.0";
let cart = [];
let users = JSON.parse(localStorage.getItem('rafidain_users_v16')) || [{username:"admin", password:"admin123", store:"الادمن الرئيسي", role:"admin"}];
let data = JSON.parse(localStorage.getItem('rafidain_data_v16')) || {products:[],customers:[],invoices:[],expenses:[],employees:[],suppliers:[],branches:[{name:"الفرع الرئيسي"}],logs:[]};
document.getElementById('year').innerText = new Date().getFullYear();

function saveAll(){
  localStorage.setItem('rafidain_data_v16', JSON.stringify(data));
  localStorage.setItem('rafidain_users_v16', JSON.stringify(users));
}

function addLog(action){data.logs.unshift({action:action,time:new Date().toLocaleString('ar')}); if(data.logs.length>50)data.logs.pop(); saveAll();}

function login(){
  let u=username.value.trim(); let p=password.value.trim();
  let user = users.find(x=>x.username==u && x.password==p);
  if(user){
    loginScreen.classList.add('hidden'); mainApp.classList.remove('hidden');
    welcomeStore.innerText=user.store; addLog("تسجيل دخول: "+user.store);
    if(user.role != 'admin') document.querySelector('.btn-admin').style.display='none';
  }else{loginError.innerText="❌ اسم المستخدم او كلمة السر خطأ"}
}

function toggleDark(){
  document.body.style.background = document.body.style.background.includes('0f2027') 
  ? 'linear-gradient(135deg, #232526 0%, #414345 100%)' 
  : 'linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%)';
}

function showPage(page){
  menuGrid.classList.add('hidden'); pageContent.classList.remove('hidden');
  let html = '<button class="btn-back" onclick="backToMenu()">رجوع</button>';

  if(page=='admin'){
    html += `<div class="header">لوحة الادمن</div>
    <input id="newStore" placeholder="اسم المحل"><input id="newUser" placeholder="اسم المستخدم"><input id="newPass" placeholder="كلمة السر">
    <button class="btn-save" onclick="addUser()">حفظ الحساب</button><hr><h4>الحسابات:</h4>`;
    users.filter(u=>u.role!='admin').forEach((u,i)=>{html+=`<div class="item-card"><div><b>${u.store}</b><br>${u.username}</div><button class="btn-delete" onclick="deleteUser(${i})">حذف</button></div>`;});
  }
  else if(page=='products'){
    html += `<div class="header">المنتجات</div><input id="pName" placeholder="اسم المنتج"><input id="pPrice" type="number" placeholder="سعر البيع"><input id="pQty" type="number" placeholder="الكمية"><button class="btn-save" onclick="saveProduct()">اضافة</button><hr>`;
    data.products.forEach((p,i)=>html+=`<div class="item-card"><div>${p.name}<br>${p.price} د.ع | ${p.qty} قطعة</div><div class="actions"><button class="btn-edit" onclick="editProduct(${i})">تعديل</button><button class="btn-delete" onclick="deleteProduct(${i})">حذف</button></div></div>`);
  }
  else if(page=='pos'){
    html += `<div class="header">نقطة البيع</div><h4>السلة: ${cart.length} منتج</h4><div class="pos-grid">`;
    data.products.forEach((p,i)=>html+=`<div class="pos-item" onclick="addToCart(${i})">${p.name}<br>${p.price} د.ع</div>`); html+=`</div><hr>`;
    cart.forEach((c,i)=>html+=`<div class="item-card">${c.name} x${c.qty} = ${c.price*c.qty} د.ع <button class="btn-delete" onclick="removeFromCart(${i})">x</button></div>`);
    html+=`<h3>الاجمالي: ${cart.reduce((a,b)=>a+b.price*b.qty,0)} د.ع</h3><button class="btn-save" onclick="checkout()">اتمام البيع</button>`;
  }
  else if(page=='invoice'){
    html += `<div class="header">فاتورة جديدة</div><select id="invCustomer"><option>اختر الزبون</option>`; data.customers.forEach(c=>html+=`<option>${c.name}</option>`); html+=`</select><input id="invTotal" type="number" placeholder="المبلغ"><button class="btn-save" onclick="saveInvoice()">اصدار</button>`;
  }
  else if(page=='invoices'){
    html += `<div class="header">الفواتير</div><hr>`; data.invoices.forEach((i,idx)=>html+=`<div class="item-card"><div>رقم ${idx+1}<br>${i.customer}<br>${i.total} د.ع<br>${i.date}</div><button class="btn-delete" onclick="deleteInvoice(${idx})">حذف</button></div>`);
  }
  else if(page=='customers'){
    html += `<div class="header">الزبائن</div><hr>`; data.customers.forEach((c,i)=>html+=`<div class="item-card"><div>${c.name}<br>${c.phone} | دين: ${c.debt||0}</div><div class="actions"><button class="btn-edit" onclick="editCustomer(${i})">تعديل</button><button class="btn-delete" onclick="deleteCustomer(${i})">حذف</button></div></div>`);
  }
  else if(page=='addCustomer'){html += `<div class="header">اضافة زبون</div><input id="cName" placeholder="الاسم"><input id="cPhone" placeholder="الهاتف"><button class="btn-save" onclick="saveCustomer()">حفظ</button>`;}
  else if(page=='debts'){html += `<div class="header">الديون</div><hr>`; data.customers.filter(c=>c.debt>0).forEach(c=>html+=`<div class="item-card">${c.name} - ${c.debt} د.ع <button class="btn-save" onclick="payDebt('${c.name}')">تسديد</button></div>`);}
  else if(page=='employees'){
    html += `<div class="header">الموظفين</div><input id="eName" placeholder="الاسم"><input id="eJob" placeholder="المنصب"><input id="eSalary" type="number" placeholder="الراتب"><button class="btn-save" onclick="saveEmployee()">اضافة</button><hr>`;
    data.employees.forEach((e,i)=>html+=`<div class="item-card"><div>${e.name}<br>${e.job} | ${e.salary} د.ع</div><div class="actions"><button class="btn-edit" onclick="editEmployee(${i})">تعديل</button><button class="btn-delete" onclick="deleteEmployee(${i})">حذف</button></div></div>`);
  }
  else if(page=='suppliers'){
    html += `<div class="header">الموردين</div><input id="sName" placeholder="الاسم"><input id="sPhone" placeholder="الهاتف"><button class="btn-save" onclick="saveSupplier()">اضافة</button><hr>`;
    data.suppliers.forEach((s,i)=>html+=`<div class="item-card"><div>${s.name}<br>${s.phone}</div><div class="actions"><button class="btn-edit" onclick="editSupplier(${i})">تعديل</button><button class="btn-delete" onclick="deleteSupplier(${i})">حذف</button></div></div>`);
  }
  else if(page=='branches'){
    html += `<div class="header">ادارة الفروع</div><input id="bName" placeholder="اسم الفرع"><button class="btn-save" onclick="addBranch()">اضافة</button><hr>`;
    data.branches.forEach((b,i)=>html+=`<div class="item-card">${b.name} <button class="btn-delete" onclick="deleteBranch(${i})">حذف</button></div>`);
  }
  else if(page=='expenses'){
    html += `<div class="header">المصروفات</div><input id="exName" placeholder="نوع المصروف"><input id="exAmount" type="number" placeholder="المبلغ"><button class="btn-save" onclick="saveExpense()">اضافة</button><hr>`;
    data.expenses.forEach((e,i)=>html+=`<div class="item-card"><div>${e.name} - ${e.amount} د.ع</div><button class="btn-delete" onclick="deleteExpense(${i})">حذف</button></div>`);
  }
  else if(page=='cashbox'){
    let income = data.invoices.reduce((a,b)=>a+Number(b.total),0); let out = data.expenses.reduce((a,b)=>a+Number(b.amount),0);
    html += `<div class="header">الصندوق</div><h3 style="color:#11998e">ايرادات: ${income}</h3><h3 style="color:#dc3545">مصروفات: ${out}</h3><h2>الصافي: ${income-out}</h2>`;
  }
  else if(page=='income'){
    html += `<div class="header">الايرادات</div><h3>اجمالي المبيعات: ${data.invoices.reduce((a,b)=>a+Number(b.total),0)} د.ع</h3><hr>`; data.invoices.forEach(i=>html+=`<div class="item-card">${i.date} - ${i.total} د.ع</div>`);
  }
  else if(page=='inventory'){
    html += `<div class="header">الجرد</div><hr>`; data.products.forEach(p=>html+=`<div class="item-card">${p.name} - الكمية: ${p.qty}</div>`);
  }
  else if(page=='reports'){
    html += `<div class="header">التقارير</div><p>المنتجات: ${data.products.length}</p><p>الزبائن: ${data.customers.length}</p><p>الفواتير: ${data.invoices.length}</p><p>المبيعات: ${data.invoices.reduce((a,b)=>a+Number(b.total),0)} د.ع</p>`;
  }
  else if(page=='broadcast'){html += `<div class="header">ارسال جماعي</div><textarea id="msg" placeholder="نص الرسالة"></textarea><button class="btn-save" onclick="alert('تم الارسال ل '+data.customers.length+' زبون')">ارسال</button>`;}
  else if(page=='ai'){let avg = data.invoices.length>0 ? data.invoices.reduce((a,b)=>a+Number(b.total),0)/data.invoices.length : 0; html += `<div class="header">توقع المبيعات</div><p>متوسط الفاتورة: ${avg.toFixed(0)} د.ع</p><p>التوقع للشهر القادم: ${(avg*30).toFixed(0)} د.ع</p>`;}
  else if(page=='backup'){html += `<div class="header">النسخ الاحتياطي</div><button class="btn-save" onclick="downloadBackup()">تحميل نسخة</button><input type="file" onchange="uploadBackup(event)">`;}
  else if(page=='logs'){html += `<div class="header">سجل الحركات</div><hr>`; data.logs.forEach(l=>html+=`<div class="item-card">${l.action}<br><small>${l.time}</small></div>`);}
  else if(page=='settings'){html += `<div class="header">الاعدادات</div><input id="storeName" placeholder="اسم المحل"><button class="btn-save" onclick="alert('تم الحفظ')">حفظ</button>`;}
  
  pageContent.innerHTML = html;
}

// دوال العمليات
function addUser(){users.push({username:newUser.value,password:newPass.value,store:newStore.value,role:"user"}); addLog("اضافة حساب: "+newStore.value); saveAll(); showPage('admin');}
function saveProduct(){data.products.push({name:pName.value,price:pPrice.value,qty:pQty.value}); addLog("اضافة منتج: "+pName.value); saveAll(); showPage('products')}
function saveCustomer(){data.customers.push({name:cName.value,phone:cPhone.value,debt:0}); addLog("اضافة زبون: "+cName.value); saveAll(); showPage('customers')}
function saveInvoice(){data.invoices.push({customer:invCustomer.value,total:invTotal.value,date:new Date().toLocaleString('ar')}); addLog("فاتورة: "+invTotal.value); saveAll(); alert('✅ تم');}
function saveEmployee(){data.employees.push({name:eName.value,job:eJob.value,salary:eSalary.value}); saveAll(); showPage('employees')}
function saveSupplier(){data.suppliers.push({name:sName.value,phone:sPhone.value}); saveAll(); showPage('suppliers')}
function saveExpense(){data.expenses.push({name:exName.value,amount:exAmount.value}); saveAll(); showPage('expenses')}
function addBranch(){data.branches.push({name:bName.value}); saveAll(); showPage('branches')}

function addToCart(i){let p=data.products[i]; let exist=cart.find(x=>x.name==p.name); if(exist)exist.qty++; else cart.push({name:p.name,price:p.price,qty:1}); showPage('pos')}
function removeFromCart(i){cart.splice(i,1); showPage('pos')}
function checkout(){let total=cart.reduce((a,b)=>a+b.price*b.qty,0); data.invoices.push({customer:"نقدي",total:total,date:new Date().toLocaleString('ar')}); addLog("بيع: "+total); cart=[]; saveAll(); alert("تم البيع"); showPage('pos')}

function deleteProduct(i){data.products.splice(i,1); saveAll(); showPage('products');}
function deleteCustomer(i){data.customers.splice(i,1); saveAll(); showPage('customers');}
function deleteInvoice(i){data.invoices.splice(i,1); saveAll(); showPage('invoices');}
function deleteEmployee(i){data.employees.splice(i,1); saveAll(); showPage('employees');}
function deleteSupplier(i){data.suppliers.splice(i,1); saveAll(); showPage('suppliers');}
function deleteExpense(i){data.expenses.splice(i,1); saveAll(); showPage('expenses');}
function deleteBranch(i){data.branches.splice(i,1); saveAll(); showPage('branches');}
function deleteUser(i){users.splice(i+1,1); saveAll(); showPage('admin');}

function editProduct(i){let n=prompt("الاسم",data.products[i].name); if(n){data.products[i].name=n; saveAll(); showPage('products');}}
function editCustomer(i){let n=prompt("الاسم",data.customers[i].name); if(n){data.customers[i].name=n; saveAll(); showPage('customers');}}
function editEmployee(i){let n=prompt("الاسم",data.employees[i].name); if(n){data.employees[i].name=n; saveAll(); showPage('employees');}}
function editSupplier(i){let n=prompt("الاسم",data.suppliers[i].name); if(n){data.suppliers[i].name=n; saveAll(); showPage('suppliers');}}
function payDebt(name){let c=data.customers.find(x=>x.name==name); c.debt=0; saveAll(); showPage('debts')}

function downloadBackup(){let blob=new Blob([JSON.stringify(data)],{type:"application/json"}); let a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download="backup.json"; a.click();}
function uploadBackup(e){let f=e.target.files[0]; let r=new FileReader(); r.onload=()=>{data=JSON.parse(r.result); saveAll(); alert("تم الاسترجاع")}; r.readAsText(f);}

function showAbout(){menuGrid.classList.add('hidden'); pageContent.classList.remove('hidden'); pageContent.innerHTML = `<button class="btn-back" onclick="backToMenu()">رجوع</button><div class="header">حول البرنامج</div><div class="about-box"><div class="logo-text">الرافدين</div><p>الاصدار: ${VERSION}</p><hr><p><b>مطور النظام: مجتبى الجابري</b></p><p><b>07825280650</b></p></div>`;}
function backToMenu(){menuGrid.classList.remove('hidden'); pageContent.classList.add('hidden')}
function logout(){addLog("خروج"); location.reload();}
</script>
</body>
</html>
