<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>عرض التقارير</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-4">

  <div class="max-w-4xl mx-auto">
    <h1 class="text-2xl font-bold text-center mb-6">تقرير المنتجات</h1>
    
    <table class="w-full bg-gray-800 rounded-lg overflow-hidden">
      <thead class="bg-blue-600">
        <tr>
          <th class="p-3 text-right">#</th>
          <th class="p-3 text-right">اسم المنتج</th>
          <th class="p-3 text-right">السعر</th>
          <th class="p-3 text-right">الكمية</th>
        </tr>
      </thead>
      <tbody id="productsTable">
      </tbody>
    </table>

    <button onclick="window.location.href='dashboard.html'" class="mt-6 w-full bg-gray-600 p-3 rounded hover:bg-gray-700">رجوع</button>
  </div>

<script>
  let products = JSON.parse(localStorage.getItem('products')) || [];
  let table = document.getElementById('productsTable');
  
  if(products.length == 0){
    table.innerHTML = '<tr><td colspan="4" class="p-4 text-center">لا توجد منتجات بعد</td></tr>';
  } else {
    products.forEach((p, i) => {
      table.innerHTML += `
        <tr class="border-b border-gray-700">
          <td class="p-3">${i+1}</td>
          <td class="p-3">${p.name}</td>
          <td class="p-3">${p.price} دينار</td>
          <td class="p-3">${p.qty}</td>
        </tr>
      `;
    });
  }
</script>

</body>
</html>
