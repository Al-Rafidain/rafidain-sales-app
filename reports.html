<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><title>التقارير</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-gray-100 p-4"><div class="max-w-4xl mx-auto bg-white p-6 rounded shadow"><h1 class="text-2xl font-bold mb-4">تقارير المبيعات</h1><div id="salesList"></div><a href="dashboard.html" class="block text-center mt-4 text-blue-600">رجوع</a></div>
<script>
if(localStorage.getItem('currentUser')!== 'admin'){ window.location.href = 'index.html'; }
let sales = JSON.parse(localStorage.getItem('sales')) || []; let list = document.getElementById('salesList');
if(sales.length === 0){ list.innerHTML = '<p>لا توجد مبيعات</p>'; }
else{ sales.forEach(s => { list.innerHTML += `<div class="border p-3 mb-2 rounded"><p><b>التاريخ:</b> ${s.date}</p><p><b>البائع:</b> ${s.user}</p><p><b>المجموع:</b> ${s.total} دينار</p></div>`; }); }
</script>
</body>
</html>
