<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>اضافة منتج</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-8">
  <h1 class="text-2xl font-bold mb-6">اضافة منتج جديد</h1>
  
  <input id="productName" type="text" placeholder="اسم المنتج" class="w-full p-3 mb-3 bg-gray-700 rounded">
  <input id="productPrice" type="number" placeholder="السعر" class="w-full p-3 mb-3 bg-gray-700 rounded">
  <input id="productQty" type="number" placeholder="الكمية" class="w-full p-3 mb-4 bg-gray-700 rounded">
  
  <button id="saveBtn" class="bg-green-600 p-3 rounded w-full font-bold">حفظ المنتج</button>
  <p id="msg" class="text-center mt-3"></p>
  <button onclick="window.location.href='dashboard.html'" class="bg-gray-600 p-3 rounded w-full font-bold mt-3">رجوع</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // هاي معلوماتك من الصورة
  const firebaseConfig = {
    apiKey: "AIzaSyDnyrQ2QFmNude7z_xQpDtoUccFciHQ",
    authDomain: "rafidain-sales.firebaseapp.com",
    projectId: "rafidain-sales",
    storageBucket: "rafidain-sales.appspot.com",
    messagingSenderId: "161657937115",
    appId: "1:161657937115:web:94c2af280187ed6a400fe"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  document.getElementById("saveBtn").onclick = async function() {
    const name = document.getElementById("productName").value;
    const price = document.getElementById("productPrice").value;
    const qty = document.getElementById("productQty").value;
    const msg = document.getElementById("msg");

    if(!name || !price || !qty){
      msg.innerText = "رجاء املأ كل الحقول";
      msg.className = "text-red-400";
      return;
    }

    try {
      await addDoc(collection(db, "products"), {
        name: name,
        price: Number(price),
        qty: Number(qty),
        date: new Date()
      });
      msg.innerText = "✅ تم حفظ المنتج بنجاح";
      msg.className = "text-green-400";
      document.getElementById("productName").value = "";
      document.getElementById("productPrice").value = "";
      document.getElementById("productQty").value = "";
    } catch (e) {
      msg.innerText = "خطأ: " + e.message;
      msg.className = "text-red-400";
    }
  }
</script>
</body>
</html>
