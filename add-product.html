<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اضافة منتج</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center h-screen">

<div class="bg-gray-800 p-8 rounded-lg shadow-lg w-96">
  <h1 class="text-2xl font-bold mb-6 text-center">اضافة منتج جديد</h1>
  
  <input id="productName" type="text" placeholder="اسم المنتج" class="w-full p-3 mb-3 bg-gray-700 rounded text-white">
  <input id="productPrice" type="number" placeholder="السعر" class="w-full p-3 mb-3 bg-gray-700 rounded text-white">
  <input id="productQty" type="number" placeholder="الكمية" class="w-full p-3 mb-3 bg-gray-700 rounded text-white">
  
  <button onclick="saveProduct()" class="w-full bg-blue-600 p-3 rounded hover:bg-blue-700 font-bold cursor-pointer mb-3">حفظ المنتج</button>
  <button onclick="window.location.href='dashboard.html'" class="w-full bg-gray-600 p-3 rounded hover:bg-gray-700 font-bold cursor-pointer">رجوع</button>
  
  <p id="msg" class="text-center mt-3 text-sm"></p>
</div>

<script>
function saveProduct(){
  const name = document.getElementById('productName').value;
  const price = document.getElementById('productPrice').value;
  const qty = document.getElementById('productQty').value;
  const msg = document.getElementById('msg');
  
  if(!name || !price || !qty){
    msg.innerText = "رجاء املأ كل الحقول";
    msg.className = "text-red-400 text-center mt-3";
    return;
  }
  
  // نحفظ المنتج بـ localStorage
  let products = JSON.parse(localStorage.getItem('products')) || [];
  products.push({name, price, qty, id: Date.now()});
  localStorage.setItem('products', JSON.stringify(products));
  
  msg.innerText = "تم حفظ المنتج بنجاح ✅";
  msg.className = "text-green-400 text-center mt-3";
  
  // نفرغ الحقول
  document.getElementById('productName').value = "";
  document.getElementById('productPrice').value = "";
  document.getElementById('productQty').value = "";
}
</script>

</body>
</html>
