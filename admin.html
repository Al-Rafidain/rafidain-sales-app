<!DOCTYPE html>
<html lang="ar" dir="rtl"><head><meta charset="UTF-8"><title>لوحة الادارة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>body{font-family:Cairo;background:#F0F2F5;padding:20px}.header{background:#FFC107;padding:20px;border-radius:16px;text-align:center;font-size:24px;font-weight:bold;margin-bottom:20px}.card{background:white;padding:20px;border-radius:16px;margin-bottom:15px}.btn{background:#1A4D8F;color:white;padding:10px;border:none;border-radius:8px;cursor:pointer;width:100%;margin-top:10px}.back-btn{background:#6C757D}</style></head>
<body>
<button class="btn back-btn" onclick="window.location.href='index.html'">⬅️ الرجوع للكاشير</button>
<div class="header">👑 لوحة الادارة</div>
<div class="card"><h3>📊 تقارير الكاشيرين</h3><div id="cashierReport"></div></div>
<div class="card"><h3>📦 المخزون</h3><div id="inventoryList"></div></div>
<script>
let customers=JSON.parse(localStorage.getItem('customers'))||[];
let orders=JSON.parse(localStorage.getItem('orders'))||[];
let products=JSON.parse(localStorage.getItem('products'))||[];
let cashiers=JSON.parse(localStorage.getItem('cashiers'))||[];
window.onload=function(){loadCashierReport();loadInventory()}
function loadCashierReport(){let html='<table style="width:100%"><tr><th>الكاشير</th><th>الطلبات</th><th>الايراد</th></tr>';cashiers.forEach(c=>{let cOrders=orders.filter(o=>o.cashier==c.name);let total=cOrders.reduce((s,o)=>s+o.total,0);html+=`<tr><td>${c.name}</td><td>${cOrders.length}</td><td>${total}</td></tr>`});document.getElementById('cashierReport').innerHTML=html+'</table>'}
function loadInventory(){let html='<table style="width:100%"><tr><th>المنتج</th><th>السعر</th><th>المخزون</th></tr>';products.forEach(p=>html+=`<tr><td>${p.name}</td><td>${p.price}</td><td>${p.stock}</td></tr>`);document.getElementById('inventoryList').innerHTML=html+'</table>'}
</script></body></html>
