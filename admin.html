<!DOCTYPE html>
<html lang="ar" dir="rtl"><head><meta charset="UTF-8"><title>تسجيل دخول الادمن</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>body{font-family:Cairo;background:#1A4D8F;display:flex;justify-content:center;align-items:center;height:100vh} .box{background:white;padding:30px;border-radius:16px;width:90%;max-width:400px;text-align:center} input{width:100%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:8px} .btn{background:#1A4D8F;color:white;padding:12px;border:none;border-radius:8px;width:100%;cursor:pointer;font-weight:bold}</style></head>
<body>
<div class="box" id="loginBox">
<h2>🔐 دخول الادمن</h2>
<input type="password" id="adminPass" placeholder="كلمة السر">
<button class="btn" onclick="checkPass()">دخول</button>
<p id="error" style="color:red"></p>
</div>

<div id="adminPanel" style="display:none;padding:20px">
<button class="btn" style="background:#6C757D;margin-bottom:20px" onclick="window.location.href='index.html'">⬅️ الرجوع للكاشير</button>
<div style="background:#FFC107;padding:20px;border-radius:16px;text-align:center;font-size:24px;font-weight:bold;margin-bottom:20px">👑 لوحة الادارة</div>
<div style="background:white;padding:20px;border-radius:16px;margin-bottom:15px"><h3>📊 تقارير الكاشيرين</h3><div id="cashierReport"></div></div>
<div style="background:white;padding:20px;border-radius:16px"><h3>📦 المخزون</h3><div id="inventoryList"></div></div>
</div>

<script>
function checkPass(){
  if(document.getElementById('adminPass').value == '1234'){
    document.getElementById('loginBox').style.display='none';
    document.getElementById('adminPanel').style.display='block';
    loadData();
  } else {
    document.getElementById('error').innerText = 'كلمة السر خطأ';
  }
}
function loadData(){
  let customers=JSON.parse(localStorage.getItem('customers'))||[];
  let orders=JSON.parse(localStorage.getItem('orders'))||[];
  let products=JSON.parse(localStorage.getItem('products'))||[];
  let cashiers=JSON.parse(localStorage.getItem('cashiers'))||[];
  
  let html='<table style="width:100%"><tr><th>الكاشير</th><th>الطلبات</th><th>الايراد</th></tr>';
  cashiers.forEach(c=>{let cOrders=orders.filter(o=>o.cashier==c.name);let total=cOrders.reduce((s,o)=>s+o.total,0);html+=`<tr><td>${c.name}</td><td>${cOrders.length}</td><td>${total}</td></tr>`});
  document.getElementById('cashierReport').innerHTML=html+'</table>';
  
  html='<table style="width:100%"><tr><th>المنتج</th><th>السعر</th><th>المخزون</th></tr>';
  products.forEach(p=>html+=`<tr><td>${p.name}</td><td>${p.price}</td><td>${p.stock}</td></tr>`);
  document.getElementById('inventoryList').innerHTML=html+'</table>';
}
</script></body></html>
